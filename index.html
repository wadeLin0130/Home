                                    <div key={acc.id} className="surface" style={{ padding: '16px', display: 'flex', flexDirection: 'column', gap: 8 }}>
                                        <div className="flex justify-between items-center w-full">
                                            <span className="font-medium text-gray-700 text-sm flex items-center gap-1">
                                                {acc.name} <span className="text-xs text-gray-400">({acc.type})</span>
                                                {(acc.type === '信用卡' || acc.type === '先用後付') && editingLimitWallet !== acc.name && adjustingWallet !== acc.name && (
                                                    <button onClick={() => { setEditingLimitWallet(acc.name); setEditLimitAmount(acc.limit.toString()); }} className="p-1 text-gray-400 hover:text-blue-600 transition-colors" title="設定最高額度">
                                                        <Icon name="settings" size={12} />
                                                    </button>
                                                )}
                                            </span>
                                            {adjustingWallet !== acc.name && editingLimitWallet !== acc.name && (
                                                <button onClick={() => { setAdjustingWallet(acc.name); setAdjustWalletAmount(acc.currentBalance.toString()); }} className="p-1 text-gray-400 hover:text-blue-600 transition-colors" title="調整餘額">
                                                    <Icon name="edit-2" size={14} />
                                                </button>
                                            )}
                                        </div>
                                        {editingLimitWallet === acc.name ? (
                                            <div className="flex items-center gap-1 mt-1">
                                                <input type="number" value={editLimitAmount} onChange={e => setEditLimitAmount(e.target.value)} className="w-full p-1.5 border rounded text-right outline-none focus:border-blue-500 text-sm" autoFocus placeholder="最高額度" />
                                                <button onClick={() => {
                                                    const val = parseFloat(editLimitAmount) || 0;
                                                    const newAccounts = accounts.map(a => a.id === acc.id ? {...a, limit: val} : a);
                                                    handleUpdateSettings(expenseCategories, incomeCategories, newAccounts);
                                                    setEditingLimitWallet(null);
                                                }} className="p-1.5 text-emerald-600 hover:bg-emerald-50 rounded"><Icon name="check" size={16}/></button>
                                            </div>
                                        ) : adjustingWallet === acc.name ? (
                                            <div className="flex items-center gap-1 mt-1">
                                                <input type="number" value={adjustWalletAmount} onChange={e => setAdjustWalletAmount(e.target.value)} className="w-full p-1.5 border rounded text-right outline-none focus:border-blue-500 text-sm" autoFocus />
                                                <button onClick={() => handleAdjustBalanceConfirm(acc.name, acc.currentBalance)} className="p-1.5 text-emerald-600 hover:bg-emerald-50 rounded"><Icon name="check" size={16}/></button>
                                                <button onClick={() => setAdjustingWallet(null)} className="p-1.5 text-rose-600 hover:bg-rose-50 rounded"><Icon name="x" size={16}/></button>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col gap-0.5 mt-1">
                                                <span className={`text-xl font-bold ${acc.currentBalance < 0 ? 'text-rose-500' : 'text-gray-900'}`}>
                                                    ${acc.currentBalance.toLocaleString()}
                                                </span>
                                                {(acc.type === '信用卡' || acc.type === '先用後付') && acc.limit > 0 && (
                                                    <span className="text-[11px] text-gray-500 flex items-center gap-1">
                                                        可用額度: ${(parseFloat(acc.limit) + acc.currentBalance).toLocaleString()}
                                                    </span>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-semibold text-gray-800 mb-4 flex items-center justify-between">
                                <div className="flex items-center gap-2"><Icon name="briefcase" size={18} /> 股票持有明細</div>
                                <div className="text-indigo-600 font-bold">${Math.round(totalStockValue).toLocaleString()}</div>
                            </h3>
                            {portfolio.length > 0 ? (
                                <div className="space-y-3">
                                    <p className="text-xs text-gray-500 border-b border-gray-100 pb-2 mb-2">資料與股價由 Google 試算表即時連動 (美金匯率: {usdRate.toFixed(2)})</p>
                                    {portfolio.map(h => {
                                        const price = h.resolvedPrice;
                                        const currentValue = h.currentValue;
                                        return (
                                            <div key={h.symbol} className="flex justify-between items-center text-sm p-2 hover:bg-gray-50 rounded-lg transition-colors">
                                                <div>
                                                    <span className="font-bold text-gray-800">{h.symbol}</span>
                                                    <span className="text-gray-500 text-xs ml-2">{h.shares} 股</span>
                                                </div>
                                                <div className="text-right">
                                                    <div className="font-medium text-gray-900">${Math.round(currentValue).toLocaleString()}</div>
                                                    {!price && <div className="text-[10px] text-rose-500">無法獲取股價，以成本顯示</div>}
                                                    {price && <div className="text-[10px] text-emerald-600">即時股價: {price}</div>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (
                                <p className="text-sm text-gray-400 py-4 text-center border border-dashed rounded-xl">目前無股票庫存</p>
                            )}
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                                <Icon name="repeat" size={18} /> 錢包轉帳
                            </h3>
                            <form onSubmit={handleTransfer} className="space-y-4">
                                <div className="flex items-center gap-2">
                                    <select value={transferForm.fromWallet} onChange={e => setTransferForm({...transferForm, fromWallet: e.target.value})} className="flex-1 p-2 border rounded-lg">
                                        {activeWallets.map(w => <option key={w} value={w}>{w}</option>)}
                                    </select>
                                    <span className="text-gray-400">至</span>
                                    <select value={transferForm.toWallet} onChange={e => setTransferForm({...transferForm, toWallet: e.target.value})} className="flex-1 p-2 border rounded-lg">
                                        {activeWallets.map(w => <option key={w} value={w}>{w}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <input type="number" value={transferForm.amount} onChange={e => setTransferForm({...transferForm, amount: e.target.value})} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="轉帳金額" min="1" required />
                                </div>
                                <div>
                                    <input type="text" value={transferForm.note} onChange={e => setTransferForm({...transferForm, note: e.target.value})} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="備註 (例如：繳卡費)" />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-medium transition-colors">確認轉帳</button>
                            </form>
                        </div>
                    </div>
                );
            };

            const renderAnalysisView = () => {
                let maxVal = 1;
                if (selectedAnalysisCats.length === 0) {
                    maxVal = Math.max(...analysisData.trendData.map(d => d.total), 1);
                } else {
                    if (chartType === 'bar') {
                        maxVal = Math.max(...analysisData.trendData.map(d => selectedAnalysisCats.reduce((sum, cat) => sum + (d.categories[cat] || 0), 0)), 1);
                    } else {
                        selectedAnalysisCats.forEach(cat => {
                            const maxCat = Math.max(...analysisData.trendData.map(d => d.categories[cat] || 0));
                            if (maxCat > maxVal) maxVal = maxCat;
                        });
                    }
                }

                return (
                    <div className="p-4 space-y-6">
                        {/* AI 理財顧問 */}
                        <div className="surface" style={{ padding: '18px 20px' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                    <div style={{ width: 32, height: 32, background: 'linear-gradient(135deg, #8b5cf6, #6366f1)', borderRadius: 9, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <Icon name="zap" size={15} style={{ color: 'white' }} />
                                    </div>
                                    <div>
                                        <p style={{ margin: 0, fontSize: '0.875rem', fontWeight: 700, color: 'var(--text)' }}>AI 理財顧問</p>
                                        <p style={{ margin: 0, fontSize: '0.72rem', color: 'var(--text-3)' }}>根據本月收支給予財務建議</p>
                                    </div>
                                </div>
                                <button onClick={handleGenerateAdvice} disabled={isAiAdvising} className="btn-pri" style={{ padding: '7px 14px', fontSize: '0.8rem', background: 'linear-gradient(135deg, #8b5cf6, #6366f1)' }}>
                                    {isAiAdvising ? <><Icon name="loader" size={13} className="animate-spin" /> 分析中...</> : <><Icon name="sparkles" size={13} /> 產生建議</>}
                                </button>
                            </div>
                            {aiAdvice
                                ? <div style={{ background: 'var(--surface-2)', borderRadius: 10, padding: '14px 16px', fontSize: '0.875rem', color: 'var(--text-2)', lineHeight: 1.7 }} className="markdown-body">{renderMarkdown(aiAdvice)}</div>
                                : !isAiAdvising && <p style={{ color: 'var(--text-3)', fontSize: '0.82rem', margin: 0 }}>點擊「產生建議」，讓 AI 根據本月收支與資產配置給出理財建議。</p>
                            }
                        </div>

                        {/* 月度分析標題 */}
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <h3 style={{ margin: 0, fontSize: '0.95rem', fontWeight: 700, color: 'var(--text)' }}>月度分析</h3>
                            <input type="month" value={analysisMonth} onChange={e => setAnalysisMonth(e.target.value)} className="field" style={{ width: 'auto', padding: '6px 10px' }} />
                        </div>

                        {/* 收入 / 支出 stat cards */}
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
                            <div className="surface stat-card">
                                <p style={{ margin: '0 0 6px', fontSize: '0.72rem', fontWeight: 600, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>總收入</p>
                                <p style={{ margin: 0, fontSize: '1.25rem', fontWeight: 800, color: 'var(--income)' }}>${analysisData.totalIncome.toLocaleString()}</p>
                            </div>
                            <div className="surface stat-card">
                                <p style={{ margin: '0 0 6px', fontSize: '0.72rem', fontWeight: 600, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>總支出</p>
                                <p style={{ margin: 0, fontSize: '1.25rem', fontWeight: 800, color: 'var(--expense)' }}>${analysisData.totalExpense.toLocaleString()}</p>
                            </div>
                            <div className="surface stat-card">
                                <p style={{ margin: '0 0 6px', fontSize: '0.72rem', fontWeight: 600, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>結餘</p>
                                <p style={{ margin: 0, fontSize: '1.25rem', fontWeight: 800, color: (analysisData.totalIncome - analysisData.totalExpense) >= 0 ? 'var(--income)' : 'var(--expense)' }}>
                                    ${(analysisData.totalIncome - analysisData.totalExpense).toLocaleString()}
                                </p>
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                            <h4 className="text-sm font-medium text-gray-700 mb-3">比較特定類別趨勢</h4>
                            <div className="flex flex-wrap gap-2 mb-4">
                                {analysisData.availableCats.map((cat, idx) => {
                                    const isSelected = selectedAnalysisCats.includes(cat);
                                    const color = isSelected ? getColor(selectedAnalysisCats.indexOf(cat)) : '#e5e7eb';
                                    return (
                                        <button key={cat} onClick={() => {
                                            if (selectedAnalysisCats.includes(cat)) setSelectedAnalysisCats(selectedAnalysisCats.filter(c => c !== cat));
                                            else setSelectedAnalysisCats([...selectedAnalysisCats, cat]);
                                        }} className={`px-3 py-1 text-xs rounded-full border transition-all ${isSelected ? 'text-white' : 'text-gray-600 bg-white'}`} style={{ backgroundColor: isSelected ? color : 'transparent', borderColor: isSelected ? color : '#e5e7eb' }}>
                                            {cat}
                                        </button>
                                    )
                                })}
                                {selectedAnalysisCats.length > 0 && <button onClick={() => setSelectedAnalysisCats([])} className="px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-500 hover:bg-gray-50">清除選擇</button>}
                            </div>
                            <div className="space-y-3 border-t pt-4">
                                {analysisData.categoriesList.length > 0 ? analysisData.categoriesList.map((cat, idx) => (
                                    <div key={idx} className="space-y-1">
                                        <div className="flex justify-between text-sm">
                                            <span className="text-gray-600">{cat.name}</span>
                                            <span className="font-medium">${cat.value.toLocaleString()} ({cat.percentage}%)</span>
                                        </div>
                                        <div className="w-full bg-gray-100 rounded-full h-2"><div className="bg-blue-500 h-2 rounded-full" style={{ width: `${cat.percentage}%` }} /></div>
                                    </div>
                                )) : <p className="text-sm text-gray-400 text-center py-4">無支出紀錄</p>}
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                            <div className="flex items-center justify-between mb-6">
                                <h4 className="text-sm font-medium text-gray-700">近六個月支出趨勢</h4>
                                <div className="flex gap-2">
                                    <button onClick={() => setChartType('line')} className={`p-1.5 rounded ${chartType === 'line' ? 'bg-blue-100 text-blue-600' : 'text-gray-400'}`}><Icon name="trending-up" size={16} /></button>
                                    <button onClick={() => setChartType('bar')} className={`p-1.5 rounded ${chartType === 'bar' ? 'bg-blue-100 text-blue-600' : 'text-gray-400'}`}><Icon name="bar-chart-2" size={16} /></button>
                                </div>
                            </div>
                            
                            <div className="h-40 relative flex items-end">
                                {chartType === 'bar' ? (
                                    <div className="w-full h-full flex items-end gap-2 px-2">
                                        {analysisData.trendData.map((d, i) => (
                                            <div key={i} className="flex-1 flex flex-col items-center gap-2 group h-full">
                                                <div className="w-full flex flex-col justify-end h-full">
                                                    {selectedAnalysisCats.length === 0 ? (
                                                        <div className="w-full bg-blue-400 relative transition-all group-hover:bg-blue-500 rounded-t-sm" style={{ height: `${(d.total / maxVal) * 100}%` }}>
                                                            <div className="opacity-0 group-hover:opacity-100 absolute -top-6 left-1/2 -translate-x-1/2 text-xs bg-gray-800 text-white px-2 py-1 rounded whitespace-nowrap z-10">${d.total}</div>
                                                        </div>
                                                    ) : (
                                                        selectedAnalysisCats.map((cat, idx) => {
                                                            const val = d.categories[cat] || 0;
                                                            return <div key={cat} style={{ height: `${(val / maxVal) * 100}%`, backgroundColor: getColor(idx) }} className="w-full transition-all" title={`${cat}: ${val}`} />
                                                        })
                                                    )}
                                                </div>
                                                <span className="text-xs text-gray-500">{d.month}</span>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="w-full h-full relative">
                                        <svg className="w-full h-[calc(100%-24px)] overflow-visible" preserveAspectRatio="none">
                                            {selectedAnalysisCats.length === 0 ? (() => {
                                                const points = analysisData.trendData.map((d, i) => { const x = (i / (analysisData.trendData.length - 1)) * 100; const y = 100 - ((d.total / maxVal) * 100); return `${x}%,${y}%`; }).join(' ');
                                                return (
                                                    <React.Fragment>
                                                        <polyline fill="none" stroke="#3b82f6" strokeWidth="2" points={points} />
                                                        {analysisData.trendData.map((d, i) => <circle key={i} cx={`${(i / (analysisData.trendData.length - 1)) * 100}%`} cy={`${100 - ((d.total / maxVal) * 100)}%`} r="4" fill="#ffffff" stroke="#3b82f6" strokeWidth="2" />)}
                                                    </React.Fragment>
                                                );
                                            })() : (
                                                selectedAnalysisCats.map((cat, idx) => {
                                                    const points = analysisData.trendData.map((d, i) => { const x = (i / (analysisData.trendData.length - 1)) * 100; const y = 100 - (((d.categories[cat] || 0) / maxVal) * 100); return `${x}%,${y}%`; }).join(' ');
                                                    return (
                                                        <React.Fragment key={cat}>
                                                            <polyline fill="none" stroke={getColor(idx)} strokeWidth="2" points={points} />
                                                            {analysisData.trendData.map((d, i) => <circle key={`${cat}-${i}`} cx={`${(i / (analysisData.trendData.length - 1)) * 100}%`} cy={`${100 - (((d.categories[cat] || 0) / maxVal) * 100)}%`} r="4" fill="#ffffff" stroke={getColor(idx)} strokeWidth="2" />)}
                                                        </React.Fragment>
                                                    );
                                                })
                                            )}
                                        </svg>
                                        <div className="absolute bottom-0 w-full flex justify-between px-1">
                                            {analysisData.trendData.map((d, i) => <span key={i} className="text-xs text-gray-500 transform -translate-x-1/2" style={{ left: `${(i / (analysisData.trendData.length - 1)) * 100}%`, position: i === 0 || i === analysisData.trendData.length - 1 ? 'relative' : 'absolute', transform: i===0 ? 'none' : (i === analysisData.trendData.length - 1 ? 'translateX(0)' : 'translateX(-50%)') }}>{d.month}</span>)}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderTaishinView = () => {
                return (
                    <div className="p-4 space-y-6 animate-in fade-in">
                        <div className="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
                            <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-4">
                                <Icon name="search" size={20} className="text-red-500" /> 台新權益快速查詢
                            </h3>
                            <div className="relative">
                                <Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                                <input
                                    type="text"
                                    value={taishinSearchTerm}
                                    onChange={(e) => setTaishinSearchTerm(e.target.value)}
                                    placeholder="搜尋通路、關鍵字 (例如：高鐵、7-11、網購)..."
                                    className="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-400 outline-none text-sm transition-shadow"
                                />
                            </div>
                            {taishinSearchTerm && (
                                <p className="text-xs text-gray-500 mt-2">
                                    正在搜尋：<span className="font-medium text-red-500">{taishinSearchTerm}</span>
                                </p>
                            )}
                        </div>

                        <div className="grid md:grid-cols-2 gap-4">
                            {filteredTaishinRewards.length > 0 ? (
                                filteredTaishinRewards.map(reward => (
                                    <div key={reward.id} className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                                        <div className={`p-4 border-b flex justify-between items-start ${reward.rateColor}`}>
                                            <div className="flex items-center gap-3">
                                                <div className="p-2 rounded-lg bg-white/60 backdrop-blur-sm shadow-sm">
                                                    <Icon name={reward.icon} size={24} />
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-lg">{reward.name}</h4>
                                                    <span className="text-sm font-bold bg-white/80 px-2 py-0.5 rounded-full mt-1 inline-block shadow-sm">
                                                        {reward.rate}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-4 flex-1 flex flex-col">
                                            <p className="text-sm text-gray-700 mb-4 font-medium">{reward.description}</p>
                                            <div className="space-y-3 flex-1">
                                                {reward.displayCats.map((cat, idx) => (
                                                    <div key={idx} className="bg-gray-50/80 p-3 rounded-lg border border-gray-100">
                                                        <h5 className="text-sm font-bold text-gray-800 mb-1">{cat.title}</h5>
                                                        <p className="text-xs text-gray-600 leading-relaxed">
                                                            <HighlightText text={cat.items} highlight={taishinSearchTerm} />
                                                        </p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <div className="col-span-full py-12 text-center text-gray-400 bg-white rounded-xl border border-dashed">
                                    <Icon name="inbox" size={48} className="mx-auto mb-3 opacity-20" />
                                    <p>找不到符合「{taishinSearchTerm}」的權益內容</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderSettingsView = () => {
                const handleAddCat = (e) => {
                    e.preventDefault();
                    if (!newCat.trim()) return;
                    let newExp = expenseCategories;
                    let newInc = incomeCategories;
                    if (catType === 'expense' && !expenseCategories.includes(newCat)) newExp = [...expenseCategories, newCat.trim()];
                    if (catType === 'income' && !incomeCategories.includes(newCat)) newInc = [...incomeCategories, newCat.trim()];
                    handleUpdateSettings(newExp, newInc, accounts);
                    setNewCat('');
                };

                const handleAddAccount = (e) => {
                    e.preventDefault();
                    if (!newAcc.name.trim()) return;
                    const newId = Date.now().toString();
                    const newAccounts = [...accounts, { ...newAcc, id: newId, initialBalance: parseFloat(newAcc.initialBalance) || 0, limit: parseFloat(newAcc.limit) || 0 }];
                    handleUpdateSettings(expenseCategories, incomeCategories, newAccounts);
                    setNewAcc({ name: '', type: '現金', initialBalance: 0, limit: 0 });
                };

                return (
                    <div className="p-4 space-y-6">
                        <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <h3 className="font-bold text-blue-900">系統設定</h3>
                            <p className="text-xs text-blue-700 mt-1">此處變更將自動同步儲存至雲端。</p>
                        </div>

                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-md font-semibold text-gray-800 mb-4 border-b pb-2">帳戶管理</h3>
                            <div className="space-y-4">
                                {accounts.map(acc => (
                                    <div key={acc.id} className="flex justify-between items-center p-2 hover:bg-gray-50 rounded">
                                        <div>
                                            <span className="font-medium text-gray-800">{acc.name}</span>
                                            <span className="text-xs text-gray-500 ml-2 bg-gray-100 px-1.5 py-0.5 rounded">{acc.type}</span>
                                        </div>
                                        <div className="flex items-center gap-4 text-sm text-gray-600">
                                            <span>初始: ${acc.initialBalance}</span>
                                            {(acc.type === '信用卡' || acc.type === '先用後付') && <span>額度: ${acc.limit}</span>}
                                            <button onClick={() => handleUpdateSettings(expenseCategories, incomeCategories, accounts.filter(a => a.id !== acc.id))} className="text-rose-500 hover:text-rose-700"><Icon name="trash-2" size={14}/></button>
                                        </div>
                                    </div>
                                ))}
                                <form onSubmit={handleAddAccount} className="flex flex-wrap gap-2 mt-4 pt-4 border-t border-dashed">
                                    <select value={newAcc.type} onChange={e => setNewAcc({...newAcc, type: e.target.value})} className="p-2 border rounded text-sm w-full sm:w-auto">
                                        <option value="現金">現金</option>
                                        <option value="信用卡">信用卡</option>
                                        <option value="先用後付">先用後付</option>
                                    </select>
                                    <input type="text" value={newAcc.name} onChange={e => setNewAcc({...newAcc, name: e.target.value})} placeholder="帳戶名稱 (如: 台新玫瑰卡)" className="flex-1 p-2 border rounded text-sm min-w-[150px]" required />
                                    <input type="number" value={newAcc.initialBalance} onChange={e => setNewAcc({...newAcc, initialBalance: e.target.value})} placeholder="初始餘額" className="w-24 p-2 border rounded text-sm" />
                                    {(newAcc.type === '信用卡' || newAcc.type === '先用後付') && (
                                        <input type="number" value={newAcc.limit} onChange={e => setNewAcc({...newAcc, limit: e.target.value})} placeholder="最高額度" className="w-24 p-2 border rounded text-sm" />
                                    )}
                                    <button type="submit" className="bg-gray-800 text-white px-3 py-2 rounded text-sm">新增帳戶</button>
                                </form>
                            </div>
                        </div>

                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-md font-semibold text-gray-800 mb-4 border-b pb-2">收支類別管理</h3>
                            <div className="grid sm:grid-cols-2 gap-6">
                                <div>
                                    <h4 className="text-sm font-medium text-gray-600 mb-2">支出類別</h4>
                                    <div className="flex flex-wrap gap-2 mb-3">
                                        {expenseCategories.map(c => (
                                            <span key={c} className="bg-rose-50 text-rose-700 text-xs px-2 py-1 rounded-full flex items-center gap-1">
                                                {c} <button onClick={() => handleUpdateSettings(expenseCategories.filter(x => x !== c), incomeCategories, accounts)}><Icon name="x" size={10}/></button>
                                            </span>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <h4 className="text-sm font-medium text-gray-600 mb-2">收入類別</h4>
                                    <div className="flex flex-wrap gap-2 mb-3">
                                        {incomeCategories.map(c => (
                                            <span key={c} className="bg-emerald-50 text-emerald-700 text-xs px-2 py-1 rounded-full flex items-center gap-1">
                                                {c} <button onClick={() => handleUpdateSettings(expenseCategories, incomeCategories.filter(x => x !== c), accounts)}><Icon name="x" size={10}/></button>
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <form onSubmit={handleAddCat} className="flex gap-2 mt-4 pt-4 border-t border-dashed">
                                <select value={catType} onChange={e => setCatType(e.target.value)} className="p-2 border rounded text-sm">
                                    <option value="expense">支出</option>
                                    <option value="income">收入</option>
                                </select>
                                <input type="text" value={newCat} onChange={e => setNewCat(e.target.value)} placeholder="新類別名稱" className="flex-1 p-2 border rounded text-sm" required />
                                <button type="submit" className="bg-gray-800 text-white px-3 py-2 rounded text-sm">新增</button>
                            </form>
                        </div>
                    </div>
                );
            };

            const Checkbox = ({ label, checked, onChange, isParent = false }) => (
                <label className={`flex items-center gap-2 cursor-pointer ${isParent ? 'font-bold text-gray-800' : 'text-sm text-gray-600'}`}>
                    <input type="checkbox" checked={checked} onChange={onChange} className="custom-checkbox" />
                    {label}
                </label>
            );

            if (isInitialLoading) {
                return null; // 取消載入畫面，因為會瞬間載入
            }

            if (!isAuthenticated) {
                return (
                    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, background: 'linear-gradient(135deg, #0c0c1a 0%, #111118 45%, #0d1117 100%)', position: 'relative', overflow: 'hidden' }}>
                        {/* Decorative blobs */}
                        <div style={{ position: 'absolute', top: '12%', left: '8%', width: 320, height: 320, background: 'radial-gradient(circle, rgba(99,102,241,0.16) 0%, transparent 65%)', borderRadius: '50%', filter: 'blur(30px)', pointerEvents: 'none' }} />
                        <div style={{ position: 'absolute', bottom: '15%', right: '8%', width: 260, height: 260, background: 'radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 65%)', borderRadius: '50%', filter: 'blur(30px)', pointerEvents: 'none' }} />
                        <div style={{ position: 'absolute', top: '55%', left: '55%', width: 180, height: 180, background: 'radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 65%)', borderRadius: '50%', filter: 'blur(25px)', pointerEvents: 'none' }} />

                        <div className="glass" style={{ padding: '40px 36px', width: '100%', maxWidth: 360, borderRadius: 24, position: 'relative' }}>
                            {/* App icon */}
                            <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 24 }}>
                                <div style={{ width: 64, height: 64, background: 'linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%)', borderRadius: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 8px 32px rgba(99,102,241,0.45), 0 2px 8px rgba(0,0,0,0.3)' }}>
                                    <span style={{ color: 'white', fontSize: 26, fontWeight: 800, lineHeight: 1 }}>帳</span>
                                </div>
                            </div>

                            <h2 style={{ color: '#f4f4f5', fontWeight: 700, fontSize: '1.35rem', textAlign: 'center', margin: '0 0 6px' }}>家庭記帳本</h2>
                            <p style={{ color: '#52525b', fontSize: '0.85rem', textAlign: 'center', margin: '0 0 28px' }}>請輸入密碼以解鎖系統</p>

                            <form onSubmit={handleLogin}>
                                <input
                                    type="password"
                                    value={systemPassword}
                                    onChange={e => setSystemPassword(e.target.value)}
                                    style={{ display: 'block', width: '100%', padding: '13px 16px', background: 'rgba(255,255,255,0.06)', border: `1px solid ${loginError ? 'rgba(239,68,68,0.5)' : 'rgba(255,255,255,0.1)'}`, borderRadius: 12, outline: 'none', color: '#f4f4f5', fontSize: '1rem', textAlign: 'center', letterSpacing: '0.25em', fontFamily: 'monospace', boxSizing: 'border-box', transition: 'border-color 0.15s' }}
                                    placeholder="••••••••"
                                    autoFocus
                                />
                                {loginError && <p style={{ color: '#f87171', fontSize: '0.8rem', textAlign: 'center', marginTop: 8, marginBottom: 0 }}>{loginError}</p>}
                                <button type="submit" style={{ display: 'block', width: '100%', marginTop: 16, padding: '13px', background: 'linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%)', border: 'none', borderRadius: 12, color: 'white', fontSize: '0.95rem', fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', boxShadow: '0 4px 20px rgba(99,102,241,0.4)', transition: 'opacity 0.15s, transform 0.1s', letterSpacing: '0.01em' }}
                                    onMouseOver={e => e.currentTarget.style.opacity = '0.9'}
                                    onMouseOut={e => e.currentTarget.style.opacity = '1'}
                                    onMouseDown={e => e.currentTarget.style.transform = 'scale(0.98)'}
                                    onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
                                >
                                    解鎖系統
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const NAV_TABS = [
                { id: 'record',   icon: 'edit-3',      label: '記帳' },
                { id: 'wallet',   icon: 'credit-card', label: '錢包與資產' },
                { id: 'analysis', icon: 'trending-up', label: '收支分析' },
                { id: 'taishin',  icon: 'award',       label: '台新卡權益' },
                { id: 'settings', icon: 'settings',    label: '系統設定' },
            ];

            return (
                <div style={{ minHeight: '100vh', display: 'flex', background: 'var(--bg)' }}>

                    {/* ── Desktop Sidebar ── */}
                    <nav className="hidden md:flex" style={{ flexDirection: 'column', width: 220, position: 'fixed', height: '100%', background: 'var(--sidebar)', zIndex: 20, top: 0, left: 0, borderRight: '1px solid var(--sidebar-border)' }}>
                        {/* Logo */}
                        <div style={{ padding: '18px 14px 14px', borderBottom: '1px solid var(--sidebar-border)' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                <div style={{ width: 36, height: 36, background: 'linear-gradient(135deg, #6366f1, #8b5cf6)', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, boxShadow: '0 2px 10px rgba(99,102,241,0.35)' }}>
                                    <span style={{ color: 'white', fontWeight: 800, fontSize: 15 }}>帳</span>
                                </div>
                                <div>
                                    <div style={{ color: '#f4f4f5', fontSize: '0.9rem', fontWeight: 700, lineHeight: 1.2 }}>家庭記帳本</div>
                                    {isSyncing
                                        ? <span style={{ color: '#818cf8', fontSize: '0.68rem', display: 'flex', alignItems: 'center', gap: 3, marginTop: 2 }}><Icon name="refresh-cw" size={10} className="animate-spin" /> 同步中...</span>
                                        : <span style={{ color: '#52525b', fontSize: '0.68rem' }}>家庭財務管理</span>
                                    }
                                </div>
                            </div>
                        </div>

                        {/* Nav */}
                        <div style={{ flex: 1, padding: '10px 10px', display: 'flex', flexDirection: 'column', gap: 2, overflowY: 'auto' }}>
                            {NAV_TABS.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`s-item${activeTab === tab.id ? ' active' : ''}`}>
                                    <Icon name={tab.icon} size={16} />
                                    <span>{tab.label}</span>
                                </button>
                            ))}
                        </div>

                        {/* Footer */}
                        <div style={{ padding: '10px 10px', borderTop: '1px solid var(--sidebar-border)' }}>
                            <div style={{ padding: '6px 12px 10px' }}>
                                <div style={{ color: '#3f3f46', fontSize: '0.68rem', marginBottom: 2 }}>目前填報者</div>
                                <select value={currentUser} onChange={e => setCurrentUser(e.target.value)} style={{ background: 'transparent', border: 'none', color: '#d4d4d8', fontSize: '0.85rem', fontWeight: 600, cursor: 'pointer', outline: 'none', fontFamily: 'inherit', padding: 0, width: '100%' }}>
                                    {users.map(u => <option key={u} value={u} style={{ background: '#18181b' }}>{u}</option>)}
                                </select>
                            </div>
                            <button onClick={handleLogout} className="s-item" style={{ color: '#71717a' }}>
                                <Icon name="log-out" size={15} />
                                <span>登出系統</span>
                            </button>
                        </div>
                    </nav>

                    {/* ── Mobile Bottom Nav ── */}
                    <nav className="md:hidden" style={{ display: 'flex', position: 'fixed', bottom: 0, width: '100%', background: 'var(--sidebar)', borderTop: '1px solid var(--sidebar-border)', zIndex: 20, padding: '6px 4px 12px' }}>
                        {[
                            { id: 'record',   icon: 'edit-3',      label: '記帳' },
                            { id: 'wallet',   icon: 'credit-card', label: '錢包' },
                            { id: 'analysis', icon: 'trending-up', label: '分析' },
                            { id: 'taishin',  icon: 'award',       label: '台新' },
                            { id: 'settings', icon: 'settings',    label: '設定' },
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '6px 0', border: 'none', background: 'none', cursor: 'pointer', color: activeTab === tab.id ? '#818cf8' : '#52525b', transition: 'color 0.14s', fontFamily: 'inherit' }}>
                                <Icon name={tab.icon} size={19} />
                                <span style={{ fontSize: '10px', fontWeight: 500 }}>{tab.label}</span>
                            </button>
                        ))}
                    </nav>

                    {/* ── Content ── */}
                    <div className="md:ml-[220px]" style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>

                        {/* Mobile header */}
                        <header className="md:hidden" style={{ background: 'var(--sidebar)', borderBottom: '1px solid var(--sidebar-border)', position: 'sticky', top: 0, zIndex: 10 }}>
                            <div style={{ padding: '11px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                    <div style={{ width: 30, height: 30, background: 'linear-gradient(135deg, #6366f1, #8b5cf6)', borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <span style={{ color: 'white', fontWeight: 800, fontSize: 13 }}>帳</span>
                                    </div>
                                    <span style={{ color: '#f4f4f5', fontSize: '1rem', fontWeight: 700 }}>家庭記帳本</span>
                                    {isSyncing && <Icon name="refresh-cw" size={13} className="animate-spin" style={{ color: '#6366f1' }} />}
                                </div>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                    <select value={currentUser} onChange={e => setCurrentUser(e.target.value)} style={{ background: 'rgba(99,102,241,0.15)', border: '1px solid rgba(99,102,241,0.3)', color: '#a5b4fc', borderRadius: 99, padding: '4px 12px', fontSize: '0.78rem', fontWeight: 600, cursor: 'pointer', outline: 'none', fontFamily: 'inherit' }}>
                                        {users.map(u => <option key={u} value={u} style={{ background: '#18181b' }}>{u}</option>)}
                                    </select>
                                    <button onClick={handleLogout} style={{ padding: '5px 6px', borderRadius: 8, background: 'rgba(239,68,68,0.12)', border: 'none', cursor: 'pointer', color: '#f87171', display: 'flex', alignItems: 'center' }}>
                                        <Icon name="log-out" size={15} />
                                    </button>
                                </div>
                            </div>
                        </header>

                        <main style={{ maxWidth: 920, margin: '0 auto', padding: '20px 16px 80px', width: '100%' }} className="md:px-6 md:py-6 md:pb-6">
                            <div className="fade-in">
                                {activeTab === 'record' && renderRecordView()}
                                {activeTab === 'wallet' && renderWalletView()}
                                {activeTab === 'analysis' && renderAnalysisView()}
                                {activeTab === 'taishin' && renderTaishinView()}
                                {activeTab === 'settings' && renderSettingsView()}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
