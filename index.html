        const processXOR = (text, key) => {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        };

        const encryptKey = (apiKey, password) => btoa(encodeURIComponent(processXOR(apiKey, password)));

        const callGeminiAPI = async (apiKey, prompt, systemInstruction = null, isJson = false) => {
            if (!apiKey) {
                 const error = new Error("無效的 API 金鑰，請重新登入");
                 error.needRelogin = true;
                 throw error;
            }
            const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };
            if (systemInstruction) payload.systemInstruction = { parts: [{ text: systemInstruction }] };
            if (isJson) payload.generationConfig = { responseMimeType: "application/json" };

            let retries = 3;
            let delay = 1000;
            while (retries > 0) {
                try {
                    const response = await fetch(GEMINI_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) {
                        if(response.status === 400) throw new Error("API 金鑰無效或發生錯誤。");
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (error) {
                    if (error.message.includes("API 金鑰無效")) throw error;
                    retries -= 1;
                    if (retries === 0) throw new Error("無法連接至 AI 服務，請稍後再試。");
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        };

            // 台新搜尋器狀態
            const [taishinSearchTerm, setTaishinSearchTerm] = useState('');

            const filteredTaishinRewards = useMemo(() => {
                const lowerFilter = taishinSearchTerm.toLowerCase().trim();
                if (!lowerFilter) return rewardsData.map(r => ({ ...r, displayCats: r.categories }));

                const results = [];
                rewardsData.forEach(reward => {
                    let isMatch = false;
                    const matchedCategories = [];

                    if (reward.name.toLowerCase().includes(lowerFilter) || reward.description.toLowerCase().includes(lowerFilter)) {
                        isMatch = true;
                    }

                    reward.categories.forEach(cat => {
                        let catMatched = false;
                        if (cat.title.toLowerCase().includes(lowerFilter) || cat.items.toLowerCase().includes(lowerFilter)) {
                            catMatched = true;
                            isMatch = true;
                        }
                        if (!catMatched) {
                            for (let keyword of cat.keywordList) {
                                if (keyword.toLowerCase().includes(lowerFilter)) {
                                    catMatched = true;
                                    isMatch = true;
                                    break;
                                }
                            }
                        }
                        if (catMatched) matchedCategories.push(cat);
                    });

                    if (isMatch) {

                let recordData = { id: Date.now().toString(), date: recordForm.date, type: recordForm.type, amount: parseFloat(recordForm.amount), note: recordForm.note, user: currentUser };

                if (recordForm.type === 'investment') {
                    if (!recordForm.symbol || !recordForm.shares) return;
                    const absoluteShares = Math.abs(parseFloat(recordForm.shares));
                    recordData = { ...recordData, market: recordForm.market, symbol: recordForm.symbol.toUpperCase(), shares: recordForm.isSell ? -absoluteShares : absoluteShares, wallet: recordForm.wallet || activeWallets[0], category: '投資', itemName: `${recordForm.market === 'TW' ? '台股' : '美股'} ${recordForm.symbol.toUpperCase()} (${recordForm.isSell ? '賣出' : '買入'})` };
                } else {
                    if (!recordForm.itemName) return;
                    recordData = { ...recordData, category: recordForm.category === '其他' && recordForm.customCategory ? recordForm.customCategory : recordForm.category, itemName: recordForm.itemName, wallet: recordForm.wallet, market: '', symbol: '', shares: '' };
                }

                updateTransactionsState([recordData, ...transactions]);
                syncWithBackend({ action: 'add', record: recordData });
                if (recordForm.type === 'investment' && !recordForm.isSell) syncWithBackend({ action: 'addSymbol', symbol: recordData.symbol, market: recordData.market });
                setRecordForm(prev => ({ ...prev, itemName: '', amount: '', note: '', customCategory: '', symbol: '', shares: '', isSell: false }));
                setIsManualFormOpen(false);
            };

            const handleEditRecord = (record) => {
                const isCustom = record.type !== 'investment' && !expenseCategories.includes(record.category) && !incomeCategories.includes(record.category);
                const sharesVal = parseFloat(record.shares);
                const isSell = record.type === 'investment' && sharesVal < 0;
                setInlineEditForm({
                    ...record, isCustom: isCustom, customCategory: isCustom ? record.category : '', isSell: isSell,
                    shares: record.shares ? Math.abs(sharesVal).toString() : '', market: record.market || 'TW', symbol: record.symbol || ''
                });
                setEditingRecordId(record.id);
            };

            const handleSaveInlineEdit = () => {
                if (!inlineEditForm.amount) return;
                let updatedRecord = { id: inlineEditForm.id, date: inlineEditForm.date, type: inlineEditForm.type, amount: parseFloat(inlineEditForm.amount), note: inlineEditForm.note, user: currentUser };

                if (inlineEditForm.type === 'investment') {
                    if (!inlineEditForm.symbol || !inlineEditForm.shares) return;
                    const absoluteShares = Math.abs(parseFloat(inlineEditForm.shares));
                    updatedRecord = { ...updatedRecord, market: inlineEditForm.market, symbol: inlineEditForm.symbol.toUpperCase(), shares: inlineEditForm.isSell ? -absoluteShares : absoluteShares, wallet: inlineEditForm.wallet, category: '投資', itemName: `${inlineEditForm.market === 'TW' ? '台股' : '美股'} ${inlineEditForm.symbol.toUpperCase()} (${inlineEditForm.isSell ? '賣出' : '買入'})` };
                } else if (inlineEditForm.type === 'transfer') {
                    updatedRecord = { ...updatedRecord, fromWallet: inlineEditForm.fromWallet, toWallet: inlineEditForm.toWallet, category: inlineEditForm.fromWallet, wallet: inlineEditForm.toWallet, itemName: '轉帳' };
                } else {
                    if (!inlineEditForm.itemName) return;
                    updatedRecord = { ...updatedRecord, category: inlineEditForm.category === '其他' && inlineEditForm.customCategory ? inlineEditForm.customCategory : inlineEditForm.category, itemName: inlineEditForm.itemName, wallet: inlineEditForm.wallet, market: '', symbol: '', shares: '' };
                }

                updateTransactionsState(transactions.map(t => t.id === updatedRecord.id ? updatedRecord : t));
                syncWithBackend({ action: 'edit', record: updatedRecord });
                if (updatedRecord.type === 'investment' && parseFloat(updatedRecord.shares) > 0) syncWithBackend({ action: 'addSymbol', symbol: updatedRecord.symbol, market: updatedRecord.market });
                setEditingRecordId(null);
                setInlineEditForm(null);
            };

            const handleDeleteRecord = (id) => {
                updateTransactionsState(transactions.filter(t => t.id.toString() !== id.toString()));
                syncWithBackend({ action: 'delete', id: id });
            };

            const handleAdjustBalanceConfirm = (wallet, currentBalance) => {
                const newBalance = parseFloat(adjustWalletAmount);
                if (isNaN(newBalance) || newBalance === currentBalance) { setAdjustingWallet(null); return; }
                const diff = newBalance - currentBalance;
                const adjustmentRecord = { id: Date.now().toString(), date: new Date().toISOString().split('T')[0], type: diff > 0 ? 'income' : 'expense', amount: Math.abs(diff), category: '其他', itemName: '餘額調整', wallet: wallet, note: `由 ${currentBalance} 調整至 ${newBalance}`, user: currentUser };
                updateTransactionsState([adjustmentRecord, ...transactions]);
                syncWithBackend({ action: 'add', record: adjustmentRecord });
                setAdjustingWallet(null);
            };

            const handleTransfer = (e) => {
                e.preventDefault();
                if (!transferForm.amount || transferForm.fromWallet === transferForm.toWallet) return;
                const newTransfer = { id: Date.now().toString(), date: new Date().toISOString().split('T')[0], type: 'transfer', amount: parseFloat(transferForm.amount), fromWallet: transferForm.fromWallet, toWallet: transferForm.toWallet, category: transferForm.fromWallet, wallet: transferForm.toWallet, note: transferForm.note, user: currentUser };
                updateTransactionsState([newTransfer, ...transactions]);
                syncWithBackend({ action: 'add', record: newTransfer });
                setTransferForm(prev => ({ ...prev, amount: '', note: '' }));
            };

            const changeRecordMonth = (offset) => {
                const [year, month] = recordMonth.split('-').map(Number);
                const newDate = new Date(year, month - 1 + offset, 1);
                const y = newDate.getFullYear();
                const m = String(newDate.getMonth() + 1).padStart(2, '0');
                setRecordMonth(`${y}-${m}`);
            };

            const renderInlineEditContent = () => (
                <div className="space-y-3 w-full animate-in fade-in">
                    <div className="flex flex-wrap gap-2">
                        <select value={inlineEditForm.type} onChange={e => setInlineEditForm({...inlineEditForm, type: e.target.value})} className="border border-blue-200 p-1.5 rounded text-sm bg-white outline-none focus:ring-2 focus:ring-blue-400">
                            <option value="expense">支出</option>
                            <option value="income">收入</option>
                            <option value="investment">投資</option>
                            <option value="transfer">轉帳</option>
                        </select>
                        <input type="date" value={inlineEditForm.date} onChange={e => setInlineEditForm({...inlineEditForm, date: e.target.value})} className="border border-blue-200 p-1.5 rounded text-sm bg-white outline-none focus:ring-2 focus:ring-blue-400" />
                    </div>
                    {inlineEditForm.type === 'investment' && (
                        <div className="flex flex-wrap gap-2">
                            <select value={inlineEditForm.market} onChange={e => setInlineEditForm({...inlineEditForm, market: e.target.value})} className="border border-blue-200 p-1.5 rounded text-sm bg-white outline-none focus:ring-2 focus:ring-blue-400">
                                <option value="TW">台股</option>
                                <option value="US">美股</option>
                            </select>
                            <input type="text" value={inlineEditForm.symbol} onChange={e => setInlineEditForm({...inlineEditForm, symbol: e.target.value.toUpperCase()})} placeholder="代號" className="border border-blue-200 p-1.5 rounded text-sm bg-white w-24 uppercase outline-none focus:ring-2 focus:ring-blue-400" />
                            <select value={inlineEditForm.isSell} onChange={e => setInlineEditForm({...inlineEditForm, isSell: e.target.value === 'true'})} className="border border-blue-200 p-1.5 rounded text-sm bg-white outline-none focus:ring-2 focus:ring-blue-400">
                                <option value={false}>買入</option>
                                <option value={true}>賣出</option>
                            </select>
                            <input type="number" step="0.00001" min="0" value={inlineEditForm.shares} onChange={e => setInlineEditForm({...inlineEditForm, shares: e.target.value})} placeholder="股數" className="border border-blue-200 p-1.5 rounded text-sm bg-white w-24 outline-none focus:ring-2 focus:ring-blue-400" />
                        </div>
                    )}
                    {(inlineEditForm.type === 'expense' || inlineEditForm.type === 'income') && (
                        <div className="flex flex-wrap gap-2">
                            <select value={inlineEditForm.category} onChange={e => setInlineEditForm({...inlineEditForm, category: e.target.value})} className="border border-blue-200 p-1.5 rounded text-sm bg-white outline-none focus:ring-2 focus:ring-blue-400">
                                {(inlineEditForm.type === 'expense' ? expenseCategories : incomeCategories).map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            {inlineEditForm.category === '其他' && (
                                <input type="text" value={inlineEditForm.customCategory} onChange={e => setInlineEditForm({...inlineEditForm, customCategory: e.target.value})} placeholder="自訂分類" className="border border-blue-200 p-1.5 rounded text-sm bg-white w-24 outline-none focus:ring-2 focus:ring-blue-400" />
                            )}
                            <input type="text" value={inlineEditForm.itemName} onChange={e => setInlineEditForm({...inlineEditForm, itemName: e.target.value})} placeholder="項目名稱" className="flex-1 min-w-[120px] border border-blue-200 p-1.5 rounded text-sm bg-white outline-none focus:ring-2 focus:ring-blue-400" />
                        </div>
                    )}
                    <div className="flex flex-wrap gap-2 items-center">
                        {inlineEditForm.type === 'investment' ? (
                            <div className="border border-gray-200 p-1.5 rounded text-sm bg-gray-50 text-gray-500 w-24 flex items-center justify-center">現金</div>
                        ) : inlineEditForm.type !== 'transfer' ? (
                            <select value={inlineEditForm.wallet} onChange={e => setInlineEditForm({...inlineEditForm, wallet: e.target.value})} className="border border-blue-200 p-1.5 rounded text-sm bg-white outline-none focus:ring-2 focus:ring-blue-400">
                                {activeWallets.map(w => <option key={w} value={w}>{w}</option>)}
                            </select>
                        ) : (
                            <React.Fragment>
                                <select value={inlineEditForm.fromWallet} onChange={e => setInlineEditForm({...inlineEditForm, fromWallet: e.target.value})} className="border border-blue-200 p-1.5 rounded text-sm bg-white outline-none focus:ring-2 focus:ring-blue-400">
                                    {activeWallets.map(w => <option key={w} value={w}>{w}</option>)}
                                </select>
                                <Icon name="arrow-right" size={14} className="text-gray-400" />
                                <select value={inlineEditForm.toWallet} onChange={e => setInlineEditForm({...inlineEditForm, toWallet: e.target.value})} className="border border-blue-200 p-1.5 rounded text-sm bg-white outline-none focus:ring-2 focus:ring-blue-400">
                                    {activeWallets.map(w => <option key={w} value={w}>{w}</option>)}
                                </select>
                            </React.Fragment>
                        )}
                        <input type="number" value={inlineEditForm.amount} onChange={e => setInlineEditForm({...inlineEditForm, amount: e.target.value})} placeholder="金額" className="border border-blue-200 p-1.5 rounded text-sm bg-white w-28 outline-none focus:ring-2 focus:ring-blue-400" />
                        <input type="text" value={inlineEditForm.note} onChange={e => setInlineEditForm({...inlineEditForm, note: e.target.value})} placeholder="備註(選填)" className="flex-1 min-w-[100px] border border-blue-200 p-1.5 rounded text-sm bg-white outline-none focus:ring-2 focus:ring-blue-400" />
                    </div>
                    <div className="flex gap-2 pt-2 mt-1">
                        <button onClick={() => setEditingRecordId(null)} className="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 py-2 rounded-lg text-sm font-medium transition-colors">取消</button>
                        <button onClick={handleSaveInlineEdit} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-1"><Icon name="check" size={16} /> 儲存修改</button>
                    </div>
                </div>
            );

            const renderRecordView = () => {
                const todayStr = getLocalDateString();
                const isViewingCurrentMonth = recordMonth === getLocalMonthString();

                // 結餘計算 (根據當前選擇的月份)
                const monthIncome = displayTransactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
                const monthExpense = displayTransactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
                const monthBalance = monthIncome - monthExpense;
                const balanceColor = monthBalance >= 0 ? 'text-emerald-600' : 'text-rose-600';

                // 搜尋邏輯
                const isSearching = recordSearchTerm.trim().length > 0;
                let searchResults = [];
                if (isSearching) {
                    let base = transactions;
                    if (aiFilteredIds) {
                        base = base.filter(t => aiFilteredIds.includes(t.id.toString()));
                    } else {
                        const term = recordSearchTerm.toLowerCase();
                        base = base.filter(t =>
                            t.itemName.toLowerCase().includes(term) ||
                            t.category.toLowerCase().includes(term) ||
                            (t.note && t.note.toLowerCase().includes(term))
                        );
                    }
                    searchResults = base.filter(filterRecord);
                }

                // 未搜尋時的日常清單邏輯
                const filteredTodayRecords = displayTransactions.filter(t => t.date === todayStr).filter(filterRecord);
                const filteredMonthRecords = (isViewingCurrentMonth ? displayTransactions.filter(t => t.date !== todayStr) : displayTransactions).filter(filterRecord);
                const todayExpenseTotal = filteredTodayRecords.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);

                const getRecordDisplayInfo = (record) => {
                    const isInvestSell = record.type === 'investment' && parseFloat(record.shares) < 0;
                    const isExpenseLike = record.type === 'expense' || (record.type === 'investment' && !isInvestSell);
                    const isIncomeLike = record.type === 'income' || isInvestSell;
                    return { isInvestSell, isExpenseLike, isIncomeLike };
                };

                const renderRecordRow = (record) => {
                    const { isInvestSell, isExpenseLike, isIncomeLike } = getRecordDisplayInfo(record);
                    return editingRecordId === record.id ? (
                        <tr key={record.id} className="bg-blue-50/40 border-b border-blue-100">
                            <td colSpan="4" className="p-3">
                                {renderInlineEditContent()}
                            </td>
                        </tr>
                    ) : (
                        <tr key={record.id} className="hover:bg-gray-50 group">
                            <td className="py-2 px-2 sm:px-3 text-gray-500 w-12 sm:w-16 whitespace-nowrap">{record.date.substring(5)}</td>
                            <td className="py-2 px-2 sm:px-3 overflow-hidden">
                                <div className="font-medium text-gray-800 truncate text-[12px] sm:text-sm">
                                    {record.type === 'transfer' ? `${record.fromWallet} ➔ ${record.toWallet}` : record.itemName}
                                </div>
                                <div className="text-[10px] text-gray-400 truncate mt-0.5">
                                    {record.type === 'investment' && <span>{isInvestSell ? '賣出' : '買入'} {Math.abs(parseFloat(record.shares))} 股</span>}
                                    {record.type !== 'transfer' && <span className="mr-1">[{record.wallet}] {record.category}</span>}
                                    {record.note && <span>• {record.note}</span>}
                                </div>
                            </td>
                            <td className={`py-2 px-2 sm:px-3 text-right font-bold w-16 sm:w-24 whitespace-nowrap ${isExpenseLike ? 'text-rose-600' : isIncomeLike ? 'text-emerald-600' : 'text-gray-700'}`}>{isExpenseLike ? '-' : isIncomeLike ? '+' : ''}${record.amount.toLocaleString()}</td>
                            <td className="py-2 px-1 text-center w-10 sm:w-16">
                                <div className="flex justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onClick={() => handleEditRecord(record)} className="p-1 text-gray-400 hover:text-blue-600 rounded bg-white shadow-sm border"><Icon name="edit-2" size={12} /></button>
                                    <button onClick={() => handleDeleteRecord(record.id)} className="p-1 text-gray-400 hover:text-rose-600 rounded bg-white shadow-sm border"><Icon name="trash-2" size={12} /></button>
                                </div>
                            </td>
                        </tr>
                    );
                };

                return (
                    <div className="p-4 space-y-6">
                        <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-4 rounded-xl shadow-sm border border-blue-100 flex flex-col sm:flex-row gap-2 items-center">
                            <div className="relative flex-1 w-full">
                                <input type="text" value={aiInputText} onChange={(e) => setAiInputText(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAiParse()} placeholder="語音或輸入自動記帳：買1股QQQ 18000" className="w-full p-2.5 pr-10 rounded-lg border-white shadow-sm focus:ring-2 focus:ring-blue-400 outline-none text-sm" disabled={isAiParsing} />
                                <button onClick={toggleVoiceInput} type="button" className={`absolute right-2 top-1/2 -translate-y-1/2 p-1.5 rounded-full transition-colors ${isListening ? 'bg-red-100 text-red-600 animate-pulse' : 'text-gray-400 hover:text-blue-600'}`}><Icon name="mic" size={16} /></button>
                            </div>
                            <button onClick={handleAiParse} disabled={isAiParsing || !aiInputText.trim()} className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors disabled:opacity-50 flex items-center justify-center gap-2 whitespace-nowrap">
                                {isAiParsing ? <><Icon name="loader" size={16} className="animate-spin" /> 處理中...</> : <><Icon name="zap" size={16} /> 直接記帳</>}
                            </button>
                        </div>

                        <div>
                            <button onClick={() => setIsManualFormOpen(!isManualFormOpen)} className="w-full flex items-center justify-between bg-white p-3.5 rounded-xl shadow-sm border border-gray-100 text-gray-700 font-medium hover:bg-gray-50 transition-colors">
                                <div className="flex items-center gap-2"><Icon name="edit-3" size={18} className="text-gray-400" /> 手動記帳</div>
                                <Icon name={isManualFormOpen ? "chevron-up" : "chevron-down"} size={18} className="text-gray-400" />
                            </button>
                            
                            {isManualFormOpen && (
                                <div className="mt-3 bg-white p-4 rounded-xl shadow-sm border border-gray-100 animate-in fade-in slide-in-from-top-2">
                                    <div className="flex gap-2 mb-4">
                                        <button onClick={() => setRecordForm({ ...recordForm, type: 'expense', category: '飲食' })} className={`flex-1 py-2 rounded-lg font-medium transition-colors ${recordForm.type === 'expense' ? 'bg-rose-500 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>支出</button>
                                        <button onClick={() => setRecordForm({ ...recordForm, type: 'income', category: '薪資' })} className={`flex-1 py-2 rounded-lg font-medium transition-colors ${recordForm.type === 'income' ? 'bg-emerald-500 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>收入</button>
                                        <button onClick={() => setRecordForm({ ...recordForm, type: 'investment', isSell: false, symbol: '', shares: '', amount: '', wallet: '現金' })} className={`flex-1 py-2 rounded-lg font-medium transition-colors ${recordForm.type === 'investment' ? 'bg-indigo-500 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>投資</button>
                                    </div>
                                    <form onSubmit={handleAddRecord} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">日期</label>
                                            <input type="date" value={recordForm.date} onChange={e => setRecordForm({...recordForm, date: e.target.value})} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required />
                                        </div>

                                        {recordForm.type === 'investment' ? (
                                            <React.Fragment>
                                                <div className="flex gap-2 bg-gray-50 p-1 rounded-lg">
                                                    <button type="button" onClick={() => setRecordForm({...recordForm, isSell: false, symbol: '', shares: '', amount: ''})} className={`flex-1 py-1.5 rounded text-sm font-medium transition-colors ${!recordForm.isSell ? 'bg-white shadow text-indigo-700' : 'text-gray-500'}`}>買入庫存</button>
                                                    <button type="button" onClick={() => setRecordForm({...recordForm, isSell: true, symbol: '', shares: '', amount: ''})} className={`flex-1 py-1.5 rounded text-sm font-medium transition-colors ${recordForm.isSell ? 'bg-white shadow text-indigo-700' : 'text-gray-500'}`}>賣出庫存</button>
                                                </div>
                                                {!recordForm.isSell && (
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">市場</label>
                                                        <div className="flex gap-2">
                                                            <button type="button" onClick={() => setRecordForm({...recordForm, market: 'TW'})} className={`flex-1 py-2 border rounded-lg text-sm font-medium transition-colors ${recordForm.market === 'TW' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white text-gray-600'}`}>台股</button>
                                                            <button type="button" onClick={() => setRecordForm({...recordForm, market: 'US'})} className={`flex-1 py-2 border rounded-lg text-sm font-medium transition-colors ${recordForm.market === 'US' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white text-gray-600'}`}>美股</button>
                                                        </div>
                                                    </div>
                                                )}
                                                <div className="flex gap-3">
                                                    {recordForm.isSell ? (
                                                        <div className="flex-1">
                                                            <label className="block text-sm font-medium text-gray-700 mb-1">選擇賣出</label>
                                                            <select value={recordForm.symbol} onChange={e => { const selected = portfolio.find(p => p.symbol === e.target.value); setRecordForm({...recordForm, symbol: e.target.value, market: selected ? selected.market : 'TW'}); }} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none uppercase" required>
                                                                <option value="">請選擇庫存</option>
                                                                {portfolio.map(p => <option key={p.symbol} value={p.symbol}>{p.symbol} (可賣: {p.shares} 股)</option>)}
                                                                {recordForm.symbol && !portfolio.find(p => p.symbol === recordForm.symbol) && <option value={recordForm.symbol}>{recordForm.symbol} (已售完)</option>}
                                                            </select>
                                                        </div>
                                                    ) : (
                                                        <div className="flex-1">
                                                            <label className="block text-sm font-medium text-gray-700 mb-1">股票代號</label>
                                                            <input type="text" value={recordForm.symbol} onChange={e => setRecordForm({...recordForm, symbol: e.target.value.toUpperCase()})} placeholder={recordForm.market === 'TW' ? "例如: 0050" : "例如: AAPL"} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none uppercase" required />
                                                        </div>
                                                    )}
                                                    <div className="flex-1">
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">{recordForm.isSell ? '賣出股數' : '購買股數'}</label>
                                                        <input type="number" step="0.00001" min="0" value={recordForm.shares} onChange={e => setRecordForm({...recordForm, shares: e.target.value})} placeholder="例如: 100" className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required />
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">{recordForm.isSell ? '賣出總金額 (TWD)' : '扣款總金額 (TWD)'}</label>
                                                    <input type="number" value={recordForm.amount} onChange={e => setRecordForm({...recordForm, amount: e.target.value})} placeholder={`本次交易的總新台幣`} min="0" step="1" className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">{recordForm.isSell ? '入帳帳戶' : '扣款帳戶'}</label>
                                                    <div className="p-2.5 bg-gray-50 border rounded-lg text-gray-600 flex justify-between items-center">
                                                        <span>現金</span><span className="text-sm font-medium">餘額: ${accountBalances['現金'] ? accountBalances['現金'].currentBalance.toLocaleString() : 0}</span>
                                                    </div>
                                                </div>
                                            </React.Fragment>
                                        ) : (
                                            <React.Fragment>
                                                <div>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">類別</label>
                                                    <select value={recordForm.category} onChange={e => setRecordForm({...recordForm, category: e.target.value})} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                                        {(recordForm.type === 'expense' ? expenseCategories : incomeCategories).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                                    </select>
                                                </div>
                                                {recordForm.category === '其他' && (
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">自訂名稱</label>
                                                        <input type="text" value={recordForm.customCategory} onChange={e => setRecordForm({...recordForm, customCategory: e.target.value})} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required />
                                                    </div>
                                                )}
                                                <div>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">項目名稱</label>
                                                    <input type="text" value={recordForm.itemName} onChange={e => setRecordForm({...recordForm, itemName: e.target.value})} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例如：午餐、水電費" required />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">金額</label>
                                                    <input type="number" value={recordForm.amount} onChange={e => setRecordForm({...recordForm, amount: e.target.value})} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0" min="0" step="1" required />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">錢包 (支付/入帳方式)</label>
                                                    <select value={recordForm.wallet} onChange={e => setRecordForm({...recordForm, wallet: e.target.value})} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                                        {activeWallets.map(w => <option key={w} value={w}>{w}</option>)}
                                                    </select>
                                                </div>
                                            </React.Fragment>
                                        )}
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">備註 (選填)</label>
                                            <input type="text" value={recordForm.note} onChange={e => setRecordForm({...recordForm, note: e.target.value})} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <button type="submit" className={`w-full py-3 rounded-lg font-medium transition-colors flex items-center justify-center gap-2 mt-2 text-white ${recordForm.type === 'investment' ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                            <Icon name="plus" size={18} /> 新增紀錄
                                        </button>
                                    </form>
                                </div>
                            )}
                        </div>

                        {/* 新增：切換月份、當月結餘、搜尋列 */}
                        <div className="flex flex-col sm:flex-row items-center justify-between mt-8 border-b pb-4 gap-4">
                            <div className="flex items-center gap-4 w-full sm:w-auto">
                                <div className="flex items-center bg-white border border-gray-200 rounded-lg shadow-sm">
                                    <button onClick={() => changeRecordMonth(-1)} className="p-2 text-gray-500 hover:text-blue-600 hover:bg-gray-50 rounded-l-lg transition-colors"><Icon name="chevron-left" size={18} /></button>
                                    <div className="px-4 font-bold text-gray-700 min-w-[100px] text-center">{recordMonth}</div>
                                    <button onClick={() => changeRecordMonth(1)} className="p-2 text-gray-500 hover:text-blue-600 hover:bg-gray-50 rounded-r-lg transition-colors"><Icon name="chevron-right" size={18} /></button>
                                </div>
                                <div className="flex flex-col">
                                    <span className="text-xs text-gray-400 font-medium">當月結餘</span>
                                    <span className={`text-sm font-bold ${balanceColor}`}>${monthBalance.toLocaleString()}</span>
                                </div>
                            </div>

                            <div className="flex w-full sm:w-auto gap-2">
                                <div className="relative flex-1 sm:w-48">
                                    <Icon name="search" size={16} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400" />
                                    <input
                                        type="text"
                                        value={recordSearchTerm}
                                        onChange={(e) => { setRecordSearchTerm(e.target.value); setAiFilteredIds(null); }}
                                        placeholder="搜尋紀錄..."
                                        className="w-full pl-8 pr-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-sm shadow-sm"
                                    />
                                </div>
                                {recordSearchTerm && (
                                    <button
                                        onClick={handleRecordAiSearch}
                                        disabled={isRecordAiSearching}
                                        className="bg-purple-100 text-purple-700 hover:bg-purple-200 px-3 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-1 whitespace-nowrap shadow-sm disabled:opacity-50"
                                        title="使用 AI 進行語意搜尋"
                                    >
                                        {isRecordAiSearching ? <Icon name="loader" size={14} className="animate-spin" /> : <Icon name="cpu" size={14} />}
                                        AI 搜尋
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="flex items-center justify-between mt-4">
                            <h3 className="text-lg font-bold text-gray-800 tracking-wide">
                                {isSearching ? '搜尋結果' : '歷史紀錄'}
                            </h3>
                            <button onClick={() => setIsFilterOpen(!isFilterOpen)} className="text-sm text-gray-500 hover:text-blue-600 flex items-center gap-1"><Icon name="filter" size={14} /> 篩選</button>
                        </div>

                        {/* 篩選器面板 */}
                        {isFilterOpen && (
                            <div className="bg-white p-4 md:p-5 rounded-xl border border-gray-200 shadow-sm space-y-4 animate-in fade-in slide-in-from-top-2 mb-6">
                                <div className="space-y-2">
                                    <Checkbox label="支出" checked={filters.expense} onChange={() => handleParentToggle('expense', allExpenseCats)} isParent />
                                    <div className="flex flex-wrap gap-x-4 gap-y-2 pl-6">
                                        {allExpenseCats.map(c => <Checkbox key={c} label={c} checked={isCatChecked('expense', c)} onChange={() => handleChildToggle('expense', c, allExpenseCats)} />)}
                                    </div>
                                </div>
                                <div className="border-t border-gray-100 pt-3 space-y-2">
                                    <Checkbox label="收入" checked={filters.income} onChange={() => handleParentToggle('income', allIncomeCats)} isParent />
                                    <div className="flex flex-wrap gap-x-4 gap-y-2 pl-6">
                                        {allIncomeCats.map(c => <Checkbox key={c} label={c} checked={isCatChecked('income', c)} onChange={() => handleChildToggle('income', c, allIncomeCats)} />)}
                                    </div>
                                </div>
                                <div className="border-t border-gray-100 pt-3 flex flex-wrap gap-x-8 gap-y-4">
                                    <div className="space-y-2">
                                        <Checkbox label="投資" checked={filters.investment} onChange={() => handleParentToggle('investment')} isParent />
                                        <div className="flex gap-4 pl-6">
                                            <Checkbox label="買入" checked={filters.investBuy} onChange={() => handleChildToggle('investment', 'investBuy')} />
                                            <Checkbox label="賣出" checked={filters.investSell} onChange={() => handleChildToggle('investment', 'investSell')} />
                                        </div>
                                    </div>
                                    <div>
                                        <Checkbox label="轉帳" checked={filters.transfer} onChange={() => setFilters(p => ({...p, transfer: !p.transfer}))} isParent />
                                    </div>
                                </div>
                            </div>
                        )}

                        {isSearching ? (
                            <div className="space-y-3 pt-2">
                                {searchResults.length > 0 ? (
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                        <table className="w-full text-left text-sm table-fixed sm:table-auto">
                                            <tbody className="divide-y divide-gray-100">
                                                {searchResults.map(renderRecordRow)}
                                            </tbody>
                                        </table>
                                    </div>
                                ) : (
                                    <p className="text-sm text-gray-400 pl-1 text-center py-6 border border-dashed rounded-xl">找不到符合的紀錄</p>
                                )}
                            </div>
                        ) : (
                            <React.Fragment>
                                {isViewingCurrentMonth && (
                                    <div className="space-y-3 pt-2">
                                        <div className="flex items-center justify-between mb-2">
                                            <h4 className="text-sm font-semibold text-gray-500">
                                                本日記帳
                                                <span className="ml-2 text-rose-500 font-medium text-xs">總花費: ${todayExpenseTotal.toLocaleString()}</span>
                                            </h4>
                                            <button onClick={handleTaishinCardAdvice} disabled={isTaishinAdvising} className="text-xs bg-indigo-50 text-indigo-700 px-2 py-1 rounded border border-indigo-100 hover:bg-indigo-100 flex items-center gap-1">
                                                {isTaishinAdvising ? <Icon name="loader" size={12} className="animate-spin"/> : <Icon name="credit-card" size={12}/>}
                                                台新卡權益AI分析
                                            </button>
                                        </div>
                                        
                                        {taishinAdvice && (
                                            <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 text-sm text-indigo-900 markdown-body relative">
                                                <button onClick={() => setTaishinAdvice('')} className="absolute top-2 right-2 text-indigo-400 hover:text-indigo-800"><Icon name="x" size={16}/></button>
                                                {renderMarkdown(taishinAdvice)}
                                            </div>
                                        )}

                                        {filteredTodayRecords.length > 0 ? (
                                            filteredTodayRecords.map(record => {
                                                const { isInvestSell, isExpenseLike, isIncomeLike } = getRecordDisplayInfo(record);
                                                return editingRecordId === record.id ? (
                                                    <div key={record.id} className="bg-blue-50/40 p-4 rounded-xl shadow-sm border border-blue-200">
                                                        {renderInlineEditContent()}
                                                    </div>
                                                ) : (
                                                <div key={record.id} className="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center text-sm group transition-colors hover:border-blue-200">
                                                    <div className="flex-1 min-w-0 pr-2">
                                                        <span className="font-medium text-gray-800 truncate block">{record.itemName}</span>
                                                        <div className="text-xs text-gray-400 truncate mt-0.5">
                                                            {record.type === 'investment' && <span>{isInvestSell ? '賣出' : '買入'} {Math.abs(parseFloat(record.shares))} 股</span>}
                                                            {record.type !== 'transfer' && <span className="mr-1">{record.wallet} • {record.category}</span>}
                                                            {record.type === 'transfer' && <span className="mr-1">{record.fromWallet} ➔ {record.toWallet}</span>}
                                                            {record.note && <span>• {record.note}</span>}
                                                        </div>
                                                    </div>
                                                    <div className="text-right shrink-0">
                                                        <div className={`font-bold ${isExpenseLike ? 'text-rose-600' : isIncomeLike ? 'text-emerald-600' : 'text-gray-700'}`}>{isExpenseLike ? '-' : isIncomeLike ? '+' : ''}${record.amount.toLocaleString()}</div>
                                                        <div className="flex gap-2 justify-end mt-1 opacity-50 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => handleEditRecord(record)} className="text-gray-400 hover:text-blue-600"><Icon name="edit-2" size={14} /></button>
                                                            <button onClick={() => handleDeleteRecord(record.id)} className="text-gray-400 hover:text-rose-600"><Icon name="trash-2" size={14} /></button>
                                                        </div>
                                                    </div>
                                                </div>
                                                )
                                            })
                                        ) : <p className="text-sm text-gray-400 pl-1">本日尚無紀錄</p>}
                                    </div>
                                )}

                                <div className="space-y-3 pt-4">
                                    <h4 className="text-sm font-semibold text-gray-500 mb-2">{isViewingCurrentMonth ? '本月其他紀錄' : '本月紀錄'}</h4>
                                    {filteredMonthRecords.length > 0 ? (
                                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                            <table className="w-full text-left text-sm table-fixed sm:table-auto">
                                                <tbody className="divide-y divide-gray-100">
                                                    {filteredMonthRecords.map(renderRecordRow)}
                                                </tbody>
                                            </table>
                                        </div>
                                    ) : <p className="text-sm text-gray-400 pl-1 text-center py-6 border border-dashed rounded-xl">本月無其他紀錄</p>}
                                </div>
                            </React.Fragment>
                        )}
                    </div>
                );
            };

            const renderWalletView = () => {
                const totalAssets = Object.values(accountBalances).reduce((a, b) => a + b.currentBalance, 0) + totalStockValue;
                return (
                    <div className="p-4 space-y-6">
                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-2xl shadow-md text-white">
                            <div className="flex justify-between items-start">
                                <div>
                                    <h3 className="text-blue-100 text-sm font-medium mb-1">總資產 (TWD)</h3>
                                    <div className="text-4xl font-bold">${Math.round(totalAssets).toLocaleString()}</div>
                                </div>
                                <button onClick={() => fetchCloudData(systemPassword)} className="p-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors flex items-center gap-2 text-sm" title="取得最新股價">
                                    <Icon name="refresh-cw" size={16} /> <span className="hidden md:inline">重整資料</span>
                                </button>
                            </div>
                        </div>

                        <div className="space-y-3">
                            <h3 className="text-lg font-semibold text-gray-800">所有帳戶</h3>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                {Object.values(accountBalances).map(acc => (
                                    <div key={acc.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-center gap-2">
                                        <div className="flex justify-between items-center w-full">
                                            <span className="font-medium text-gray-700 text-sm flex items-center gap-1">
                                                {acc.name} <span className="text-xs text-gray-400">({acc.type})</span>
                                                {(acc.type === '信用卡' || acc.type === '先用後付') && editingLimitWallet !== acc.name && adjustingWallet !== acc.name && (
                                                    <button onClick={() => { setEditingLimitWallet(acc.name); setEditLimitAmount(acc.limit.toString()); }} className="p-1 text-gray-400 hover:text-blue-600 transition-colors" title="設定最高額度">
                                                        <Icon name="settings" size={12} />
                                                    </button>
                                                )}
                                            </span>
                                            {adjustingWallet !== acc.name && editingLimitWallet !== acc.name && (
                                                <button onClick={() => { setAdjustingWallet(acc.name); setAdjustWalletAmount(acc.currentBalance.toString()); }} className="p-1 text-gray-400 hover:text-blue-600 transition-colors" title="調整餘額">
                                                    <Icon name="edit-2" size={14} />
                                                </button>
                                            )}
                                        </div>
                                        {editingLimitWallet === acc.name ? (
                                            <div className="flex items-center gap-1 mt-1">
                                                <input type="number" value={editLimitAmount} onChange={e => setEditLimitAmount(e.target.value)} className="w-full p-1.5 border rounded text-right outline-none focus:border-blue-500 text-sm" autoFocus placeholder="最高額度" />
                                                <button onClick={() => {
                                                    const val = parseFloat(editLimitAmount) || 0;
                                                    const newAccounts = accounts.map(a => a.id === acc.id ? {...a, limit: val} : a);
                                                    handleUpdateSettings(expenseCategories, incomeCategories, newAccounts);
                                                    setEditingLimitWallet(null);
                                                }} className="p-1.5 text-emerald-600 hover:bg-emerald-50 rounded"><Icon name="check" size={16}/></button>
                                            </div>
                                        ) : adjustingWallet === acc.name ? (
                                            <div className="flex items-center gap-1 mt-1">
                                                <input type="number" value={adjustWalletAmount} onChange={e => setAdjustWalletAmount(e.target.value)} className="w-full p-1.5 border rounded text-right outline-none focus:border-blue-500 text-sm" autoFocus />
                                                <button onClick={() => handleAdjustBalanceConfirm(acc.name, acc.currentBalance)} className="p-1.5 text-emerald-600 hover:bg-emerald-50 rounded"><Icon name="check" size={16}/></button>
                                                <button onClick={() => setAdjustingWallet(null)} className="p-1.5 text-rose-600 hover:bg-rose-50 rounded"><Icon name="x" size={16}/></button>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col gap-0.5 mt-1">
                                                <span className={`text-xl font-bold ${acc.currentBalance < 0 ? 'text-rose-500' : 'text-gray-900'}`}>
                                                    ${acc.currentBalance.toLocaleString()}
                                                </span>
                                                {(acc.type === '信用卡' || acc.type === '先用後付') && acc.limit > 0 && (
                                                    <span className="text-[11px] text-gray-500 flex items-center gap-1">
                                                        可用額度: ${(parseFloat(acc.limit) + acc.currentBalance).toLocaleString()}
                                                    </span>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-semibold text-gray-800 mb-4 flex items-center justify-between">
                                <div className="flex items-center gap-2"><Icon name="briefcase" size={18} /> 股票持有明細</div>
                                <div className="text-indigo-600 font-bold">${Math.round(totalStockValue).toLocaleString()}</div>
                            </h3>
                            {portfolio.length > 0 ? (
                                <div className="space-y-3">
                                    <p className="text-xs text-gray-500 border-b border-gray-100 pb-2 mb-2">資料與股價由 Google 試算表即時連動 (美金匯率: {usdRate.toFixed(2)})</p>
                                    {portfolio.map(h => {
                                        const price = h.resolvedPrice;
                                        const currentValue = h.currentValue;
                                        return (
                                            <div key={h.symbol} className="flex justify-between items-center text-sm p-2 hover:bg-gray-50 rounded-lg transition-colors">
                                                <div>
                                                    <span className="font-bold text-gray-800">{h.symbol}</span>
                                                    <span className="text-gray-500 text-xs ml-2">{h.shares} 股</span>
                                                </div>
                                                <div className="text-right">
                                                    <div className="font-medium text-gray-900">${Math.round(currentValue).toLocaleString()}</div>
                                                    {!price && <div className="text-[10px] text-rose-500">無法獲取股價，以成本顯示</div>}
                                                    {price && <div className="text-[10px] text-emerald-600">即時股價: {price}</div>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (
                                <p className="text-sm text-gray-400 py-4 text-center border border-dashed rounded-xl">目前無股票庫存</p>
                            )}
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                                <Icon name="repeat" size={18} /> 錢包轉帳
                            </h3>
                            <form onSubmit={handleTransfer} className="space-y-4">
                                <div className="flex items-center gap-2">
                                    <select value={transferForm.fromWallet} onChange={e => setTransferForm({...transferForm, fromWallet: e.target.value})} className="flex-1 p-2 border rounded-lg">
                                        {activeWallets.map(w => <option key={w} value={w}>{w}</option>)}
                                    </select>
                                    <span className="text-gray-400">至</span>
                                    <select value={transferForm.toWallet} onChange={e => setTransferForm({...transferForm, toWallet: e.target.value})} className="flex-1 p-2 border rounded-lg">
                                        {activeWallets.map(w => <option key={w} value={w}>{w}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <input type="number" value={transferForm.amount} onChange={e => setTransferForm({...transferForm, amount: e.target.value})} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="轉帳金額" min="1" required />
                                </div>
                                <div>
                                    <input type="text" value={transferForm.note} onChange={e => setTransferForm({...transferForm, note: e.target.value})} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="備註 (例如：繳卡費)" />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-medium transition-colors">確認轉帳</button>
                            </form>
                        </div>
                    </div>
                );
            };

            const renderAnalysisView = () => {
                let maxVal = 1;
                if (selectedAnalysisCats.length === 0) {
                    maxVal = Math.max(...analysisData.trendData.map(d => d.total), 1);
                } else {
                    if (chartType === 'bar') {
                        maxVal = Math.max(...analysisData.trendData.map(d => selectedAnalysisCats.reduce((sum, cat) => sum + (d.categories[cat] || 0), 0)), 1);
                    } else {
                        selectedAnalysisCats.forEach(cat => {
                            const maxCat = Math.max(...analysisData.trendData.map(d => d.categories[cat] || 0));
                            if (maxCat > maxVal) maxVal = maxCat;
                        });
                    }
                }

                return (
                    <div className="p-4 space-y-6">
                        <div className="bg-gradient-to-r from-purple-50 to-pink-50 p-5 rounded-2xl border border-purple-100 shadow-sm">
                            <div className="flex justify-between items-start mb-2">
                                <h3 className="text-lg font-semibold text-purple-900 flex items-center gap-2">
                                    <Icon name="message-circle" size={20} /> AI 理財顧問
                                </h3>
                                <button onClick={handleGenerateAdvice} disabled={isAiAdvising} className="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1.5 rounded-lg text-sm transition-colors flex items-center gap-2">
                                    {isAiAdvising ? <Icon name="loader" size={14} className="animate-spin" /> : <Icon name="zap" size={14} />}
                                    {isAiAdvising ? '分析中...' : '產生本月建議'}
                                </button>
                            </div>
                            {aiAdvice && <div className="mt-3 text-sm text-purple-800 leading-relaxed bg-white/60 p-4 rounded-xl markdown-body">{renderMarkdown(aiAdvice)}</div>}
                            {!aiAdvice && !isAiAdvising && <p className="text-sm text-purple-600/70 mt-1">點擊按鈕，讓 AI 根據您本月的收支狀況與資產配置給予專業理財建議。</p>}
                        </div>

                        <div className="flex items-center justify-between">
                            <h3 className="text-lg font-semibold text-gray-800">月度分析</h3>
                            <input type="month" value={analysisMonth} onChange={e => setAnalysisMonth(e.target.value)} className="p-2 border rounded-lg text-sm outline-none" />
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                                <p className="text-emerald-800 text-sm font-medium mb-1">總收入</p>
                                <p className="text-xl font-bold text-emerald-600">${analysisData.totalIncome.toLocaleString()}</p>
                            </div>
                            <div className="bg-rose-50 p-4 rounded-xl border border-rose-100">
                                <p className="text-rose-800 text-sm font-medium mb-1">總支出</p>
                                <p className="text-xl font-bold text-rose-600">${analysisData.totalExpense.toLocaleString()}</p>
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                            <h4 className="text-sm font-medium text-gray-700 mb-3">比較特定類別趨勢</h4>
                            <div className="flex flex-wrap gap-2 mb-4">
                                {analysisData.availableCats.map((cat, idx) => {
                                    const isSelected = selectedAnalysisCats.includes(cat);
                                    const color = isSelected ? getColor(selectedAnalysisCats.indexOf(cat)) : '#e5e7eb';
                                    return (
                                        <button key={cat} onClick={() => {
                                            if (selectedAnalysisCats.includes(cat)) setSelectedAnalysisCats(selectedAnalysisCats.filter(c => c !== cat));
                                            else setSelectedAnalysisCats([...selectedAnalysisCats, cat]);
                                        }} className={`px-3 py-1 text-xs rounded-full border transition-all ${isSelected ? 'text-white' : 'text-gray-600 bg-white'}`} style={{ backgroundColor: isSelected ? color : 'transparent', borderColor: isSelected ? color : '#e5e7eb' }}>
                                            {cat}
                                        </button>
                                    )
                                })}
                                {selectedAnalysisCats.length > 0 && <button onClick={() => setSelectedAnalysisCats([])} className="px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-500 hover:bg-gray-50">清除選擇</button>}
                            </div>
                            <div className="space-y-3 border-t pt-4">
                                {analysisData.categoriesList.length > 0 ? analysisData.categoriesList.map((cat, idx) => (
                                    <div key={idx} className="space-y-1">
                                        <div className="flex justify-between text-sm">
                                            <span className="text-gray-600">{cat.name}</span>
                                            <span className="font-medium">${cat.value.toLocaleString()} ({cat.percentage}%)</span>
                                        </div>
                                        <div className="w-full bg-gray-100 rounded-full h-2"><div className="bg-blue-500 h-2 rounded-full" style={{ width: `${cat.percentage}%` }} /></div>
                                    </div>
                                )) : <p className="text-sm text-gray-400 text-center py-4">無支出紀錄</p>}
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                            <div className="flex items-center justify-between mb-6">
                                <h4 className="text-sm font-medium text-gray-700">近六個月支出趨勢</h4>
                                <div className="flex gap-2">
                                    <button onClick={() => setChartType('line')} className={`p-1.5 rounded ${chartType === 'line' ? 'bg-blue-100 text-blue-600' : 'text-gray-400'}`}><Icon name="trending-up" size={16} /></button>
                                    <button onClick={() => setChartType('bar')} className={`p-1.5 rounded ${chartType === 'bar' ? 'bg-blue-100 text-blue-600' : 'text-gray-400'}`}><Icon name="bar-chart-2" size={16} /></button>
                                </div>
                            </div>
                            
                            <div className="h-40 relative flex items-end">
                                {chartType === 'bar' ? (
                                    <div className="w-full h-full flex items-end gap-2 px-2">
                                        {analysisData.trendData.map((d, i) => (
                                            <div key={i} className="flex-1 flex flex-col items-center gap-2 group h-full">
                                                <div className="w-full flex flex-col justify-end h-full">
                                                    {selectedAnalysisCats.length === 0 ? (
                                                        <div className="w-full bg-blue-400 relative transition-all group-hover:bg-blue-500 rounded-t-sm" style={{ height: `${(d.total / maxVal) * 100}%` }}>
                                                            <div className="opacity-0 group-hover:opacity-100 absolute -top-6 left-1/2 -translate-x-1/2 text-xs bg-gray-800 text-white px-2 py-1 rounded whitespace-nowrap z-10">${d.total}</div>
                                                        </div>
                                                    ) : (
                                                        selectedAnalysisCats.map((cat, idx) => {
                                                            const val = d.categories[cat] || 0;
                                                            return <div key={cat} style={{ height: `${(val / maxVal) * 100}%`, backgroundColor: getColor(idx) }} className="w-full transition-all" title={`${cat}: ${val}`} />
                                                        })
                                                    )}
                                                </div>
                                                <span className="text-xs text-gray-500">{d.month}</span>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="w-full h-full relative">
                                        <svg className="w-full h-[calc(100%-24px)] overflow-visible" preserveAspectRatio="none">
                                            {selectedAnalysisCats.length === 0 ? (() => {
                                                const points = analysisData.trendData.map((d, i) => { const x = (i / (analysisData.trendData.length - 1)) * 100; const y = 100 - ((d.total / maxVal) * 100); return `${x}%,${y}%`; }).join(' ');
                                                return (
                                                    <React.Fragment>
                                                        <polyline fill="none" stroke="#3b82f6" strokeWidth="2" points={points} />
                                                        {analysisData.trendData.map((d, i) => <circle key={i} cx={`${(i / (analysisData.trendData.length - 1)) * 100}%`} cy={`${100 - ((d.total / maxVal) * 100)}%`} r="4" fill="#ffffff" stroke="#3b82f6" strokeWidth="2" />)}
                                                    </React.Fragment>
                                                );
                                            })() : (
                                                selectedAnalysisCats.map((cat, idx) => {
                                                    const points = analysisData.trendData.map((d, i) => { const x = (i / (analysisData.trendData.length - 1)) * 100; const y = 100 - (((d.categories[cat] || 0) / maxVal) * 100); return `${x}%,${y}%`; }).join(' ');
                                                    return (
                                                        <React.Fragment key={cat}>
                                                            <polyline fill="none" stroke={getColor(idx)} strokeWidth="2" points={points} />
                                                            {analysisData.trendData.map((d, i) => <circle key={`${cat}-${i}`} cx={`${(i / (analysisData.trendData.length - 1)) * 100}%`} cy={`${100 - (((d.categories[cat] || 0) / maxVal) * 100)}%`} r="4" fill="#ffffff" stroke={getColor(idx)} strokeWidth="2" />)}
                                                        </React.Fragment>
                                                    );
                                                })
                                            )}
                                        </svg>
                                        <div className="absolute bottom-0 w-full flex justify-between px-1">
                                            {analysisData.trendData.map((d, i) => <span key={i} className="text-xs text-gray-500 transform -translate-x-1/2" style={{ left: `${(i / (analysisData.trendData.length - 1)) * 100}%`, position: i === 0 || i === analysisData.trendData.length - 1 ? 'relative' : 'absolute', transform: i===0 ? 'none' : (i === analysisData.trendData.length - 1 ? 'translateX(0)' : 'translateX(-50%)') }}>{d.month}</span>)}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderTaishinView = () => {
                return (
                    <div className="p-4 space-y-6 animate-in fade-in">
                        <div className="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
                            <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-4">
                                <Icon name="search" size={20} className="text-red-500" /> 台新權益快速查詢
                            </h3>
                            <div className="relative">
                                <Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                                <input
                                    type="text"
                                    value={taishinSearchTerm}
                                    onChange={(e) => setTaishinSearchTerm(e.target.value)}
                                    placeholder="搜尋通路、關鍵字 (例如：高鐵、7-11、網購)..."
                                    className="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-400 outline-none text-sm transition-shadow"
                                />
                            </div>
                            {taishinSearchTerm && (
                                <p className="text-xs text-gray-500 mt-2">
                                    正在搜尋：<span className="font-medium text-red-500">{taishinSearchTerm}</span>
                                </p>
                            )}
                        </div>

                        <div className="grid md:grid-cols-2 gap-4">
                            {filteredTaishinRewards.length > 0 ? (
                                filteredTaishinRewards.map(reward => (
                                    <div key={reward.id} className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                                        <div className={`p-4 border-b flex justify-between items-start ${reward.rateColor}`}>
                                            <div className="flex items-center gap-3">
                                                <div className="p-2 rounded-lg bg-white/60 backdrop-blur-sm shadow-sm">
                                                    <Icon name={reward.icon} size={24} />
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-lg">{reward.name}</h4>
                                                    <span className="text-sm font-bold bg-white/80 px-2 py-0.5 rounded-full mt-1 inline-block shadow-sm">
                                                        {reward.rate}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-4 flex-1 flex flex-col">
                                            <p className="text-sm text-gray-700 mb-4 font-medium">{reward.description}</p>
                                            <div className="space-y-3 flex-1">
                                                {reward.displayCats.map((cat, idx) => (
                                                    <div key={idx} className="bg-gray-50/80 p-3 rounded-lg border border-gray-100">
                                                        <h5 className="text-sm font-bold text-gray-800 mb-1">{cat.title}</h5>
                                                        <p className="text-xs text-gray-600 leading-relaxed">
                                                            <HighlightText text={cat.items} highlight={taishinSearchTerm} />
                                                        </p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : (
