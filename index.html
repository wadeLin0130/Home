    <style>
        :root {
            --sidebar: #111118;
            --sidebar-border: #1f1f2e;
            --sidebar-hover: #1c1c2a;
            --sidebar-active-bg: rgba(99,102,241,0.14);
            --sidebar-active-color: #a5b4fc;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99,102,241,0.25);
            --bg: #f3f4f8;
            --surface: #ffffff;
            --surface-2: #f8f9fc;
            --border: #e5e7eb;
            --text: #111827;
            --text-2: #6b7280;
            --text-3: #9ca3af;
            --expense: #dc2626;
            --expense-bg: #fef2f2;
            --income: #059669;
            --income-bg: #ecfdf5;
            --invest: #7c3aed;
            --invest-bg: #f5f3ff;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root { min-height: 100vh; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body strong { font-weight: 600; color: #1e293b; }
        .custom-checkbox { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
        .highlight { background: #fef08a; font-weight: 600; padding: 0 2px; border-radius: 3px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }

        /* Animations */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeUp 0.22s ease forwards; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; display: inline-flex !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }

        /* Sidebar nav item */
        .s-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; border-radius: 9px;
            font-size: 0.855rem; font-weight: 500;
            color: #71717a; cursor: pointer;
            transition: background 0.14s, color 0.14s;
            width: 100%; border: none; background: none;
            text-align: left; font-family: inherit;
        }
        .s-item:hover { background: var(--sidebar-hover); color: #e4e4e7; }
        .s-item.active { background: var(--sidebar-active-bg); color: var(--sidebar-active-color); }

        /* Form field */
        .field {
            width: 100%; padding: 10px 14px;
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 10px; font-size: 0.875rem; color: var(--text);
            outline: none; transition: border-color 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }
        .field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); background: white; }
        .field::placeholder { color: var(--text-3); }
        select.field { cursor: pointer; }

        /* Surface card */
        .surface { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }

        /* Primary button */
        .btn-pri {
            background: var(--accent); color: #fff;
            padding: 10px 18px; border-radius: 10px;
            font-size: 0.875rem; font-weight: 600;
            border: none; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: background 0.14s, transform 0.1s;
            font-family: inherit; white-space: nowrap;
        }
        .btn-pri:hover { background: var(--accent-hover); }
        .btn-pri:active { transform: scale(0.97); }
        .btn-pri:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Secondary button */
        .btn-sec {
            background: var(--surface-2); color: var(--text-2);
            padding: 10px 18px; border-radius: 10px;
            font-size: 0.875rem; font-weight: 500;
            border: 1px solid var(--border); cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: background 0.14s, color 0.14s;
            font-family: inherit;
        }
        .btn-sec:hover { background: var(--border); color: var(--text); }
        .btn-sec:active { transform: scale(0.97); }

        /* Transaction row */
        .tx-row td { padding: 10px 12px; }
        .tx-row:hover { background: var(--surface-2); }
        .tx-row:hover .tx-actions { opacity: 1; }
        .tx-actions { opacity: 0; transition: opacity 0.15s; }

        /* Amount colors */
        .c-expense { color: var(--expense); }
        .c-income { color: var(--income); }
        .c-invest-buy { color: var(--invest); }
        .c-transfer { color: var(--text-2); }

        /* Glass effect for login */
        .glass {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.13);
        }

        /* Category tag */
        .cat-tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 9px; border-radius: 99px;
            font-size: 0.72rem; font-weight: 500;
        }

        /* Stat card */
        .stat-card { border-radius: 12px; padding: 16px 18px; }

        /* Div-based transaction card row */
        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .tx-card {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            transition: background 0.12s;
            cursor: default;
            animation: rowIn 0.22s ease forwards;
            opacity: 0;
        }
        .tx-card:last-child { border-bottom: none; }
        .tx-card:hover { background: var(--surface-2); }
        .tx-card:hover .tx-actions { opacity: 1 !important; }
        .tx-card:nth-child(1)  { animation-delay: 0ms; }
        .tx-card:nth-child(2)  { animation-delay: 35ms; }
        .tx-card:nth-child(3)  { animation-delay: 70ms; }
        .tx-card:nth-child(4)  { animation-delay: 105ms; }
        .tx-card:nth-child(5)  { animation-delay: 140ms; }
        .tx-card:nth-child(6)  { animation-delay: 170ms; }
        .tx-card:nth-child(7)  { animation-delay: 200ms; }
        .tx-card:nth-child(n+8) { animation-delay: 230ms; }

        /* Type icon bubble */
        .type-icon {
            width: 34px; height: 34px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        /* Month stat chips */
        .mstat { display: flex; flex-direction: column; }
        .mstat-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-3); }
        .mstat-val { font-size: 0.875rem; font-weight: 700; line-height: 1.2; }

        .form-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }

        .seg-btn { flex: 1; padding: 9px 8px; border-radius: 9px; font-size: 0.855rem; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .seg-btn.off { background: var(--surface-2); color: var(--text-3); }
        .seg-btn.off:hover { background: var(--border); color: var(--text-2); }

</head>

        const processXOR = (text, key) => {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        };

        const encryptKey = (apiKey, password) => btoa(encodeURIComponent(processXOR(apiKey, password)));

        };

        const callGeminiAPI = async (apiKey, prompt, systemInstruction = null, isJson = false) => {
            if (!apiKey) {
                 const error = new Error("無效的 API 金鑰，請重新登入");
                 error.needRelogin = true;
                 throw error;
            }
            const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };
            if (systemInstruction) payload.systemInstruction = { parts: [{ text: systemInstruction }] };
            if (isJson) payload.generationConfig = { responseMimeType: "application/json" };

            let retries = 3;
            let delay = 1000;
            while (retries > 0) {
                try {
                    const response = await fetch(GEMINI_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) {
                        if(response.status === 400) throw new Error("API 金鑰無效或發生錯誤。");
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";

                    if (error.message.includes("API 金鑰無效")) throw error;
                    retries -= 1;
                    if (retries === 0) throw new Error("無法連接至 AI 服務，請稍後再試。");

                    { title: "保費優惠", items: "最高享 1.3% 回饋，或可選不限金額分 12 期 0 利率。", keywordList: ["保費", "保險", "分期", "1.3%"] },
                    { title: "停車優惠", items: "一般消費滿 NT$6,000，享次月機車路邊停車 8 次優惠。", keywordList: ["停車", "機車", "滿額"] }
                ]
            }
        ];

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [systemPassword, setSystemPassword] = useState('');
            const [activeApiKey, setActiveApiKey] = useState('');
            const [loginError, setLoginError] = useState('');
            const [rawApiKey, setRawApiKey] = useState('');
            const [setupPassword, setSetupPassword] = useState('');
            const [generatedEncryptedKey, setGeneratedEncryptedKey] = useState('');

            const [isInitialLoading, setIsInitialLoading] = useState(true);
            const [isSyncing, setIsSyncing] = useState(false);

            const [activeTab, setActiveTab] = useState('record');
            const users = ['我', '寶寶'];
            const [currentUser, setCurrentUser] = useState('我');
            
            const [transactions, setTransactions] = useState([]);
            const [stockPrices, setStockPrices] = useState({});
            const [usdRate, setUsdRate] = useState(32.5);

            const [expenseCategories, setExpenseCategories] = useState(defaultExpenseCats);
            const [incomeCategories, setIncomeCategories] = useState(defaultIncomeCats);
            const [accounts, setAccounts] = useState(defaultAccounts);

            const activeWallets = useMemo(() => accounts.map(a => a.name), [accounts]);

            const [isManualFormOpen, setIsManualFormOpen] = useState(false);
            const [recordForm, setRecordForm] = useState({
                type: 'expense', date: getLocalDateString(), category: '飲食', customCategory: '',
                itemName: '', amount: '', wallet: '現金', note: '', market: 'TW', symbol: '', shares: '', isSell: false
            });

            const [editingRecordId, setEditingRecordId] = useState(null);
            const [inlineEditForm, setInlineEditForm] = useState(null);

            const [aiInputText, setAiInputText] = useState('');
            const [isAiParsing, setIsAiParsing] = useState(false);
            const [aiAdvice, setAiAdvice] = useState('');
            const [isAiAdvising, setIsAiAdvising] = useState(false);

            const [taishinAdvice, setTaishinAdvice] = useState('');
            const [isTaishinAdvising, setIsTaishinAdvising] = useState(false);

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognitionRef = useRef(null);
            const [isListening, setIsListening] = useState(false);

            const [recordMonth, setRecordMonth] = useState(getLocalMonthString());
            const [adjustingWallet, setAdjustingWallet] = useState(null);
            const [adjustWalletAmount, setAdjustWalletAmount] = useState('');
            const [editingLimitWallet, setEditingLimitWallet] = useState(null);
            const [editLimitAmount, setEditLimitAmount] = useState('');
            const [transferForm, setTransferForm] = useState({ fromWallet: '現金', toWallet: '信用卡', amount: '', note: '' });
            const [analysisMonth, setAnalysisMonth] = useState(getLocalMonthString());
            const [chartType, setChartType] = useState('line');

            const [isFilterOpen, setIsFilterOpen] = useState(false);
            const [filters, setFilters] = useState({
                expense: true, income: true, investment: true, transfer: true, investBuy: true, investSell: true, expenseCats: {}, incomeCats: {}
            });
            const [selectedAnalysisCats, setSelectedAnalysisCats] = useState([]);

            const [newCat, setNewCat] = useState('');
            const [catType, setCatType] = useState('expense');
            const [newAcc, setNewAcc] = useState({ name: '', type: '現金', initialBalance: 0, limit: 0 });

            // 搜尋與 AI 搜尋狀態
            const [recordSearchTerm, setRecordSearchTerm] = useState('');
            const [isRecordAiSearching, setIsRecordAiSearching] = useState(false);
            const [aiFilteredIds, setAiFilteredIds] = useState(null);

            useEffect(() => {
                if (!recordSearchTerm) {
                    setAiFilteredIds(null);
                }
            }, [recordSearchTerm]);

            // 台新搜尋器狀態
            const [taishinSearchTerm, setTaishinSearchTerm] = useState('');

            const filteredTaishinRewards = useMemo(() => {
                const lowerFilter = taishinSearchTerm.toLowerCase().trim();
                if (!lowerFilter) return rewardsData.map(r => ({ ...r, displayCats: r.categories }));

                const results = [];
                rewardsData.forEach(reward => {
                    let isMatch = false;
                    const matchedCategories = [];

                    if (reward.name.toLowerCase().includes(lowerFilter) || reward.description.toLowerCase().includes(lowerFilter)) {
                        isMatch = true;
                    }

                    reward.categories.forEach(cat => {
                        let catMatched = false;
                        if (cat.title.toLowerCase().includes(lowerFilter) || cat.items.toLowerCase().includes(lowerFilter)) {
                            catMatched = true;
                            isMatch = true;
                        }
                        if (!catMatched) {
                            for (let keyword of cat.keywordList) {
                                if (keyword.toLowerCase().includes(lowerFilter)) {
                                    catMatched = true;
                                    isMatch = true;
                                    break;
                                }
                            }
                        }
                        if (catMatched) matchedCategories.push(cat);
                    });

                    if (isMatch) {
                        results.push({
                            ...reward,
                            displayCats: matchedCategories.length > 0 && !reward.name.toLowerCase().includes(lowerFilter) && !reward.description.toLowerCase().includes(lowerFilter) ? matchedCategories : reward.categories
                        });
                    }
                });
                return results;
            }, [taishinSearchTerm]);

            const formatDateString = (dateVal) => {
                if (!dateVal) return '';
                const d = new Date(dateVal);
                if (!isNaN(d.getTime())) {
                    const year = d.getFullYear();
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    return `${year}-${month}-${day}`;
                }
                if (typeof dateVal === 'string' && dateVal.includes('T')) return dateVal.split('T')[0];
                return String(dateVal).substring(0, 10);
            };

            const updateTransactionsState = (updater) => {
                setTransactions(prev => {
                    const nextState = typeof updater === 'function' ? updater(prev) : updater;
                    try { localStorage.setItem('cachedTransactions', JSON.stringify(nextState)); } catch(e){}
                    return nextState;
                });
            };

            const syncWithBackend = (payload) => {
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ ...payload, pwd: systemPassword })
                })
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'error') {
                        console.error("資料庫拒絕存取：", data.message);
                        alert("寫入資料庫失敗，請確認您的密碼是否正確，以及 Google Apps Script 部署權限是否設為「所有人」。");
                    }
                })
                .catch(err => {
                    console.error("網路請求錯誤：", err);
                });
            };

            const saveSettingsToCloud = (newSettings) => {
                setIsSyncing(true);
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'saveSettings', settings: newSettings, pwd: systemPassword })
                }).then(res => res.json())
                  .then(data => {
                    setIsSyncing(false);
                    if(data.status === 'error') {
                        alert("儲存設定失敗，後端回傳錯誤：" + data.message);
                    } else {
                        try { localStorage.setItem('cachedSettings', JSON.stringify(newSettings)); } catch(e) {}
                    }
                }).catch(err => {
                    console.error(err);
                    setIsSyncing(false);
                    alert("儲存設定時發生網路錯誤，請確認網址與權限設定。");
                });
            };

            const handleUpdateSettings = (newExp, newInc, newAcc) => {
                setExpenseCategories(newExp);
                setIncomeCategories(newInc);
                setAccounts(newAcc);
                saveSettingsToCloud({
                    expenseCategories: newExp,
                    incomeCategories: newInc,
                    accounts: newAcc
                });
            };

            const fetchCloudData = (pwd) => {
                setIsSyncing(true);
                try {
                    const cachedTx = localStorage.getItem('cachedTransactions');
                    const cachedPrices = localStorage.getItem('cachedPrices');
                    const cachedSettings = localStorage.getItem('cachedSettings');
                    if (cachedTx) {
                        setTransactions(JSON.parse(cachedTx));
                    }
                    if (cachedPrices) setStockPrices(JSON.parse(cachedPrices));
                    if (cachedSettings) {
                        const s = JSON.parse(cachedSettings);
                        if (s.expenseCategories) setExpenseCategories(s.expenseCategories);
                        if (s.incomeCategories) setIncomeCategories(s.incomeCategories);
                        if (s.accounts) setAccounts(s.accounts);
                    }
                } catch(e) {}

                const queryUrl = `${SCRIPT_URL}?pwd=${encodeURIComponent(pwd)}`;
                fetch(queryUrl)
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'error') throw new Error(data.message);
                        
                        if (data.settings && Object.keys(data.settings).length > 0) {
                            let updatedSettings = {};
                            if (data.settings.expenseCategories) {
                                const parsed = JSON.parse(data.settings.expenseCategories);
                                setExpenseCategories(parsed);
                                updatedSettings.expenseCategories = parsed;
                            }
                            if (data.settings.incomeCategories) {
                                const parsed = JSON.parse(data.settings.incomeCategories);
                                setIncomeCategories(parsed);
                                updatedSettings.incomeCategories = parsed;
                            }
                            if (data.settings.accounts) {
                                const accData = JSON.parse(data.settings.accounts);
                                setAccounts(accData);
                                updatedSettings.accounts = accData;
                            }
                            try { localStorage.setItem('cachedSettings', JSON.stringify(updatedSettings)); } catch(e) {}
                        }

                        if (data.transactions) {
                            const parsedRecords = data.transactions.map(t => ({
                                ...t, amount: parseFloat(t.amount) || 0, shares: t.shares ? (parseFloat(t.shares) || 0) : '', date: formatDateString(t.date),
                                fromWallet: t.type === 'transfer' ? (t.category || '現金') : t.fromWallet, toWallet: t.type === 'transfer' ? (t.wallet || '信用卡') : t.toWallet
                            }));
                            parsedRecords.sort((a, b) => {
                                if (a.date !== b.date) return b.date.localeCompare(a.date);
                                return String(b.id).localeCompare(String(a.id));
                            });
                            setTransactions(parsedRecords);
                            try { localStorage.setItem('cachedTransactions', JSON.stringify(parsedRecords)); } catch(e){}
                        }
                        if (data.prices) {
                            const newPrices = {};
                            Object.keys(data.prices).forEach(key => {
                                let val = data.prices[key];
                                if (typeof val === 'string') {
                                    val = val.replace(/,/g, '');
                                    const match = val.match(/-?\d+\.?\d*/);
                                    val = match ? parseFloat(match[0]) : NaN;
                                } else { val = parseFloat(val); }
                                if (!isNaN(val) && val > 0) newPrices[String(key).trim().toUpperCase()] = val;
                            });
                            if (newPrices['TWD=X']) setUsdRate(newPrices['TWD=X']);
                            else if (newPrices['USDTWD']) setUsdRate(newPrices['USDTWD']);
                            setStockPrices(newPrices);
                            try { localStorage.setItem('cachedPrices', JSON.stringify(newPrices)); } catch(e){}
                        }
                    })
                    .catch(err => {
                        console.error("資料載入失敗", err);
                        if(err.message === '未經授權的存取') {
                            handleLogout();
                            alert("密碼錯誤或登入已過期，請重新登入。");
                        }
                    })
                    .finally(() => {
                        setIsInitialLoading(false);
                        setIsSyncing(false);
                    });
            };

            useEffect(() => { if (typeof feather !== 'undefined') feather.replace(); });

            useEffect(() => {
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.continuous = false;
                    recognition.interimResults = false;
                    recognition.lang = 'zh-TW';
                    recognition.onstart = () => setIsListening(true);
                    recognition.onend = () => setIsListening(false);
                    recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        setAiInputText(prev => prev ? prev + ' ' + transcript : transcript);
                    };
                    recognition.onerror = (event) => {
                        console.error("Speech recognition error", event.error);
                        setIsListening(false);
                    };
                    recognitionRef.current = recognition;
                }
            }, [SpeechRecognition]);

            const toggleVoiceInput = () => {
                if (!recognitionRef.current) { alert("瀏覽器不支援語音功能"); return; }
                if (isListening) recognitionRef.current.stop(); else recognitionRef.current.start();
            };

            useEffect(() => {
                if (ENCRYPTED_API_KEY) {
                    try {
                        const savedPwd = localStorage.getItem('systemPassword');
                        if (savedPwd) {
                             const decrypted = decryptKey(ENCRYPTED_API_KEY, savedPwd);
                             if(decrypted.startsWith("AIza")) {
                                 setSystemPassword(savedPwd);
                                 setActiveApiKey(decrypted);
                                 setIsAuthenticated(true);
                                 fetchCloudData(savedPwd);
                                 setIsInitialLoading(false);
                             } else {
                                handleLogout();
                                setIsInitialLoading(false);
                             }
                        } else {
                            setIsInitialLoading(false);
                        }
                    } catch (e) {
                        handleLogout();
                        setIsInitialLoading(false);
                    }
                } else {
                    setIsInitialLoading(false);
                }
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                setLoginError('');
                const decrypted = decryptKey(ENCRYPTED_API_KEY, systemPassword);
                if (decrypted.startsWith("AIza")) {
                    try { localStorage.setItem('systemPassword', systemPassword); } catch(e) {}
                    setActiveApiKey(decrypted);
                    setIsAuthenticated(true);
                    fetchCloudData(systemPassword);
                    setIsInitialLoading(false);
                } else setLoginError('密碼錯誤，無法解鎖系統。');
            };

            const handleLogout = () => {
                try { localStorage.removeItem('systemPassword'); } catch(e) {}
                setIsAuthenticated(false);
                setSystemPassword('');
                setActiveApiKey('');
                setTransactions([]);
                setIsInitialLoading(false);
                setIsSyncing(false);
            };

            const handleGenerateEncryptedKey = () => {
                if (!rawApiKey || !setupPassword) return;
                setGeneratedEncryptedKey(encryptKey(rawApiKey, setupPassword));
            };

            const allExpenseCats = useMemo(() => Array.from(new Set([...expenseCategories, ...transactions.filter(t=>t.type==='expense').map(t=>t.category)])), [transactions, expenseCategories]);
            const allIncomeCats = useMemo(() => Array.from(new Set([...incomeCategories, ...transactions.filter(t=>t.type==='income').map(t=>t.category)])), [transactions, incomeCategories]);

            const displayTransactions = useMemo(() => transactions.filter(t => t.date.startsWith(recordMonth)), [transactions, recordMonth]);

            const isCatChecked = (type, cat) => filters[`${type}Cats`][cat] !== false;

            const handleParentToggle = (type, subCats) => {
                setFilters(prev => {
                    const nextVal = !prev[type];
                    const nextObj = { ...prev, [type]: nextVal };
                    if (type === 'investment') { nextObj.investBuy = nextVal; nextObj.investSell = nextVal; } 
                    else if (type === 'expense' || type === 'income') {
                        const newCats = {}; subCats.forEach(c => newCats[c] = nextVal);
                        nextObj[`${type}Cats`] = newCats;
                    }
                    return nextObj;
                });
            };

            const handleChildToggle = (parentType, childKey, allChildren) => {
                setFilters(prev => {
                    const nextObj = { ...prev };
                    if (parentType === 'investment') {
                        nextObj[childKey] = !prev[childKey];
                        nextObj.investment = nextObj.investBuy && nextObj.investSell;
                    } else {
                        const currentCatState = prev[`${parentType}Cats`] || {};
                        const newCats = { ...currentCatState, [childKey]: currentCatState[childKey] === false }; 
                        nextObj[`${parentType}Cats`] = newCats;
                        nextObj[parentType] = allChildren.every(c => newCats[c] !== false);
                    }
                    return nextObj;
                });
            };

            const filterRecord = (t) => {
                if (t.type === 'transfer') return filters.transfer;
                if (t.type === 'expense') return filters.expenseCats[t.category] !== false;
                if (t.type === 'income') return filters.incomeCats[t.category] !== false;
                if (t.type === 'investment') return (parseFloat(t.shares) < 0) ? filters.investSell : filters.investBuy;
                return true;
            };

            const accountBalances = useMemo(() => {
                const balances = {};
                accounts.forEach(acc => {
                    balances[acc.name] = { ...acc, currentBalance: parseFloat(acc.initialBalance) || 0 };
                });

                transactions.forEach(t => {
                    if (t.type === 'expense' && balances[t.wallet]) balances[t.wallet].currentBalance -= t.amount;
                    else if (t.type === 'income' && balances[t.wallet]) balances[t.wallet].currentBalance += t.amount;
                    else if (t.type === 'transfer') {
                        if (balances[t.fromWallet]) balances[t.fromWallet].currentBalance -= t.amount;
                        if (balances[t.toWallet]) balances[t.toWallet].currentBalance += t.amount;
                    } else if (t.type === 'investment' && balances['現金']) {
                        balances['現金'].currentBalance += (Number(t.shares) < 0) ? t.amount : -t.amount;
                    }
                });
                return balances;
            }, [transactions, accounts]);

            const { portfolio, totalStockValue } = useMemo(() => {
                const holdings = {};
                const sortedTx = [...transactions].sort((a, b) => {
                    const dateCmp = a.date.localeCompare(b.date);
                    return dateCmp !== 0 ? dateCmp : String(a.id).localeCompare(String(b.id)); 
                });

                sortedTx.forEach(t => {
                    if (t.type === 'investment') {
                        const market = t.market || 'TW';
                        const symbol = String(t.symbol || '').trim().toUpperCase();
                        const key = market === 'TW' ? `${symbol}.TW` : symbol;
                        if (!holdings[key]) holdings[key] = { symbol, market, shares: 0, cost: 0 };
                        const txShares = parseFloat(t.shares) || 0;
                        const txAmount = parseFloat(t.amount) || 0;
                        if (txShares < 0) {
                            const costPerShare = holdings[key].shares > 0 ? holdings[key].cost / holdings[key].shares : 0;
                            holdings[key].shares -= Math.abs(txShares);
                            holdings[key].cost -= costPerShare * Math.abs(txShares);
                        } else {
                            holdings[key].shares += txShares;
                            holdings[key].cost += txAmount;
                        }
                    }
                });
                
                const activePortfolio = Object.values(holdings).filter(h => h.shares > 0);
                let totalValue = 0;
                
                activePortfolio.forEach(h => {
                    const cleanSymbol = h.symbol.replace(/\.TW$/, '').replace(/^TPE:/, '');
                    const possibleKeys = [cleanSymbol, `${cleanSymbol}.TW`, `TPE:${cleanSymbol}`, `${cleanSymbol}:TPE`];
                    let price = null;
                    for (const k of possibleKeys) {
                        if (stockPrices[k] !== undefined && !isNaN(stockPrices[k])) { price = stockPrices[k]; break; }
                    }
                    if (price === null) {
                        const fuzzyKey = Object.keys(stockPrices).find(k => k.includes(cleanSymbol));
                        if (fuzzyKey) price = stockPrices[fuzzyKey];
                    }
                    let currentVal = price ? (h.market === 'TW' ? price * h.shares : price * h.shares * usdRate) : h.cost;
                    h.resolvedPrice = price; h.currentValue = currentVal; totalValue += currentVal;
                });

                return { portfolio: activePortfolio, totalStockValue: totalValue };
            }, [transactions, stockPrices, usdRate]);

            const analysisData = useMemo(() => {
                const monthTransactions = transactions.filter(t => t.date.startsWith(analysisMonth) && t.type !== 'transfer');
                let totalExpense = 0; let totalIncome = 0; const categoryTotals = {};

                monthTransactions.forEach(t => {
                    if (t.type === 'expense') {
                        totalExpense += t.amount;
                        categoryTotals[t.category] = (categoryTotals[t.category] || 0) + t.amount;
                    } else if (t.type === 'income') {
                        totalIncome += t.amount;
                    }
                });

                const categoriesList = Object.keys(categoryTotals).map(cat => ({
                    name: cat, value: categoryTotals[cat],
                    percentage: totalExpense ? ((categoryTotals[cat] / totalExpense) * 100).toFixed(1) : 0
                })).sort((a, b) => b.value - a.value);

                const availableCats = expenseCategories;
                
                const trendData = [];
                const today = new Date();
                
                for (let i = 5; i >= 0; i--) {
                    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
                    const monthStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    const point = { month: `${d.getMonth() + 1}月`, monthStr, total: 0, categories: {} };
                    
                    transactions.filter(t => t.date.startsWith(monthStr) && t.type === 'expense').forEach(t => {
                        point.total += t.amount;
                        point.categories[t.category] = (point.categories[t.category] || 0) + t.amount;
                    });
                    trendData.push(point);
                }

                return { totalExpense, totalIncome, categoriesList, trendData, availableCats };
            }, [transactions, analysisMonth, expenseCategories]);

            const handleAiParse = async () => {
                if (!aiInputText.trim()) return;
                setIsAiParsing(true);
                try {
                    const systemInstruction = `您是一個專業的記帳助理。請將使用者的自然語言輸入解析為 JSON 陣列 (Array of objects)，以支援多筆同時記帳。
今天日期是: ${getLocalDateString()}。若使用者沒有特別說明日期，預設為今天。
請判斷使用者的每一筆輸入，並輸出為對應格式的 JSON 物件：
1. 支出: {"type": "expense", "category": "嚴格從[${expenseCategories.join(', ')}]選擇一項", "itemName": "簡短名稱", "amount": 數字(正數), "wallet": "帳戶名稱", "date": "YYYY-MM-DD", "note": "備註"}
2. 收入: {"type": "income", "category": "嚴格從[${incomeCategories.join(', ')}]選擇一項", "itemName": "簡短名稱", "amount": 數字(正數), "wallet": "帳戶名稱", "date": "YYYY-MM-DD", "note": "備註"}
3. 投資: {"type": "investment", "symbol": "股票代號,日月光是3711", "shares": 數字(買入正，賣出負), "amount": 數字(總金額絕對值), "market": "TW" 或 "US", "date": "YYYY-MM-DD", "note": "備註", "wallet": "現金"}
4. 轉帳: {"type": "transfer", "amount": 數字(正數), "fromWallet": "帳戶名稱", "toWallet": "帳戶名稱", "note": "備註", "date": "YYYY-MM-DD"}
可用帳戶名單：${activeWallets.join(', ')}。若使用者未指定，請預設使用 "現金"。請務必回傳 JSON 陣列。不要包含任何 markdown。分類(category)絕對不能自行創造，必須完全吻合給定的列表。`;

                    const responseText = await callGeminiAPI(activeApiKey, aiInputText, systemInstruction, true);
                    let parsedData = JSON.parse(responseText.trim());
                    if (!Array.isArray(parsedData)) parsedData = [parsedData];
                    
                    const newRecords = [];
                    const timestamp = Date.now();
                    
                    parsedData.forEach((data, index) => {
                        let baseRecord = {
                            id: (timestamp + index).toString(),
                            date: data.date || getLocalDateString(),
                            type: data.type || 'expense',
                            amount: parseFloat(data.amount) || 0,
                            user: currentUser,
                        };
                        
                        if (data.type === 'investment') {
                            const isSell = parseFloat(data.shares) < 0;

                                    {record.type === 'investment' && <span>{isInvestSell ? '賣出' : '買入'} {Math.abs(parseFloat(record.shares))} 股 &bull; </span>}
                                    {record.type !== 'transfer' && <span>{record.category} &bull; {record.wallet}</span>}
                                    {record.type === 'transfer' && <span>轉帳</span>}
                                    {record.note && <span> &bull; {record.note}</span>}
                                </div>
                            </div>
                            <span style={{ fontSize: '0.7rem', color: 'var(--text-3)', flexShrink: 0, marginRight: 4 }}>
                                {record.date.substring(5)}
                            </span>
                            <div style={{ fontWeight: 700, fontSize: '0.875rem', color: amountColor, flexShrink: 0, minWidth: 60, textAlign: 'right', fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.01em' }}>
                                {amountPrefix}${record.amount.toLocaleString()}
                            </div>
                            <div className="tx-actions" style={{ opacity: 0, transition: 'opacity 0.15s', display: 'flex', gap: 4, flexShrink: 0 }}>
                                <button onClick={() => handleEditRecord(record)} style={{ padding: '4px 5px', border: '1px solid var(--border)', borderRadius: 7, background: 'var(--surface)', cursor: 'pointer', display: 'flex', color: 'var(--text-3)', transition: 'color 0.12s, border-color 0.12s' }}
                                    onMouseOver={e => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
                                    onMouseOut={e => { e.currentTarget.style.color = 'var(--text-3)'; e.currentTarget.style.borderColor = 'var(--border)'; }}
                                ><Icon name="edit-2" size={12} /></button>
                                <button onClick={() => handleDeleteRecord(record.id)} style={{ padding: '4px 5px', border: '1px solid var(--border)', borderRadius: 7, background: 'var(--surface)', cursor: 'pointer', display: 'flex', color: 'var(--text-3)', transition: 'color 0.12s, border-color 0.12s' }}
                                    onMouseOver={e => { e.currentTarget.style.color = 'var(--expense)'; e.currentTarget.style.borderColor = 'var(--expense)'; }}
                                    onMouseOut={e => { e.currentTarget.style.color = 'var(--text-3)'; e.currentTarget.style.borderColor = 'var(--border)'; }}
                                ><Icon name="trash-2" size={12} /></button>
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="p-4 space-y-6">
                        <div className="surface" style={{ padding: '14px 16px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 8 }}>
                                <Icon name="zap" size={14} style={{ color: 'var(--accent)' }} />
                                <span style={{ fontSize: '0.78rem', fontWeight: 600, color: 'var(--accent)' }}>AI 智慧記帳</span>
                                <span style={{ fontSize: '0.72rem', color: 'var(--text-3)', marginLeft: 2 }}>直接說出或輸入消費描述</span>
                            </div>
                            <div className="flex flex-col sm:flex-row gap-2">
                                <div style={{ position: 'relative', flex: 1 }}>
                                    <input
                                        type="text"
                                        value={aiInputText}
                                        onChange={(e) => setAiInputText(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleAiParse()}
                                        placeholder="例：昨天午餐花 120 元、買 1 股 QQQ 花了 18000"
                                        className="field"
                                        style={{ paddingRight: 40 }}
                                        disabled={isAiParsing}
                                    />
                                    <button onClick={toggleVoiceInput} type="button" style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', padding: 4, border: 'none', background: 'none', cursor: 'pointer', display: 'flex', color: isListening ? 'var(--expense)' : 'var(--text-3)', transition: 'color 0.15s' }} className={isListening ? 'animate-pulse' : ''}>
                                        <Icon name="mic" size={16} />
                                    </button>
                                </div>
                                <button onClick={handleAiParse} disabled={isAiParsing || !aiInputText.trim()} className="btn-pri" style={{ justifyContent: 'center' }}>
                                    {isAiParsing
                                        ? <><Icon name="loader" size={15} className="animate-spin" /> 解析中...</>
                                        : <><Icon name="zap" size={15} /> 直接記帳</>
                                    }
                                </button>
                            </div>
                        </div>

                        <div>
                            <button onClick={() => setIsManualFormOpen(!isManualFormOpen)} className="surface" style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 16px', cursor: 'pointer', border: '1px solid var(--border)', background: isManualFormOpen ? 'var(--surface)' : 'var(--surface)', transition: 'background 0.15s', fontFamily: 'inherit' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: 'var(--text)', fontSize: '0.875rem', fontWeight: 600 }}>
                                    <Icon name="edit-3" size={16} style={{ color: 'var(--text-3)' }} /> 手動記帳
                                </div>
                                <Icon name={isManualFormOpen ? "chevron-up" : "chevron-down"} size={16} style={{ color: 'var(--text-3)' }} />
                            </button>
                            
                            {isManualFormOpen && (
                                <div className="form-panel fade-in">
                                    <div style={{ display: 'flex', gap: 6, marginBottom: 16, padding: 4, background: 'var(--surface-2)', borderRadius: 12, border: '1px solid var(--border)' }}>
                                        <button onClick={() => setRecordForm({ ...recordForm, type: 'expense', category: '飲食' })} className={`seg-btn ${recordForm.type === 'expense' ? '' : 'off'}`} style={recordForm.type === 'expense' ? { background: 'var(--expense)', color: '#fff' } : {}}>支出</button>
                                        <button onClick={() => setRecordForm({ ...recordForm, type: 'income', category: '薪資' })} className={`seg-btn ${recordForm.type === 'income' ? '' : 'off'}`} style={recordForm.type === 'income' ? { background: 'var(--income)', color: '#fff' } : {}}>收入</button>
                                        <button onClick={() => setRecordForm({ ...recordForm, type: 'investment', isSell: false, symbol: '', shares: '', amount: '', wallet: '現金' })} className={`seg-btn ${recordForm.type === 'investment' ? '' : 'off'}`} style={recordForm.type === 'investment' ? { background: 'var(--invest)', color: '#fff' } : {}}>投資</button>
                                    </div>
                                    <form onSubmit={handleAddRecord} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                                        <div>
                                            <label className="form-label">日期</label>
                                            <input type="date" value={recordForm.date} onChange={e => setRecordForm({...recordForm, date: e.target.value})} className="field" required />
                                        </div>

                                        {recordForm.type === 'investment' ? (
                                            <React.Fragment>
                                                <div style={{ display: 'flex', gap: 6, padding: 4, background: 'var(--surface-2)', borderRadius: 12, border: '1px solid var(--border)' }}>
                                                    <button type="button" onClick={() => setRecordForm({...recordForm, isSell: false, symbol: '', shares: '', amount: ''})} className={`seg-btn ${!recordForm.isSell ? '' : 'off'}`} style={!recordForm.isSell ? { background: 'var(--invest)', color: '#fff' } : {}}>買入庫存</button>
                                                    <button type="button" onClick={() => setRecordForm({...recordForm, isSell: true, symbol: '', shares: '', amount: ''})} className={`seg-btn ${recordForm.isSell ? '' : 'off'}`} style={recordForm.isSell ? { background: 'var(--income)', color: '#fff' } : {}}>賣出庫存</button>
                                                </div>
                                                {!recordForm.isSell && (
                                                    <div>
                                                        <label className="form-label">市場</label>
                                                        <div style={{ display: 'flex', gap: 6 }}>
                                                            <button type="button" onClick={() => setRecordForm({...recordForm, market: 'TW'})} className={`seg-btn ${recordForm.market === 'TW' ? '' : 'off'}`} style={recordForm.market === 'TW' ? { background: 'var(--accent)', color: '#fff' } : {}}>台股</button>
                                                            <button type="button" onClick={() => setRecordForm({...recordForm, market: 'US'})} className={`seg-btn ${recordForm.market === 'US' ? '' : 'off'}`} style={recordForm.market === 'US' ? { background: 'var(--accent)', color: '#fff' } : {}}>美股</button>
                                                        </div>
                                                    </div>
                                                )}
                                                <div className="flex gap-3">
                                                    {recordForm.isSell ? (
                                                        <div className="flex-1">
                                                            <label className="form-label">選擇賣出</label>
                                                            <select value={recordForm.symbol} onChange={e => { const selected = portfolio.find(p => p.symbol === e.target.value); setRecordForm({...recordForm, symbol: e.target.value, market: selected ? selected.market : 'TW'}); }} className="field" style={{ textTransform: 'uppercase' }} required>
                                                                <option value="">請選擇庫存</option>
                                                                {portfolio.map(p => <option key={p.symbol} value={p.symbol}>{p.symbol} (可賣: {p.shares} 股)</option>)}
                                                                {recordForm.symbol && !portfolio.find(p => p.symbol === recordForm.symbol) && <option value={recordForm.symbol}>{recordForm.symbol} (已售完)</option>}
                                                            </select>
                                                        </div>
                                                    ) : (
                                                        <div className="flex-1">
                                                            <label className="form-label">股票代號</label>
                                                            <input type="text" value={recordForm.symbol} onChange={e => setRecordForm({...recordForm, symbol: e.target.value.toUpperCase()})} placeholder={recordForm.market === 'TW' ? "例如: 0050" : "例如: AAPL"} className="field" style={{ textTransform: 'uppercase' }} required />
                                                        </div>
                                                    )}
                                                    <div className="flex-1">
                                                        <label className="form-label">{recordForm.isSell ? '賣出股數' : '購買股數'}</label>
                                                        <input type="number" step="0.00001" min="0" value={recordForm.shares} onChange={e => setRecordForm({...recordForm, shares: e.target.value})} placeholder="例如: 100" className="field" required />
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="form-label">{recordForm.isSell ? '賣出總金額 (TWD)' : '扣款總金額 (TWD)'}</label>
                                                    <input type="number" value={recordForm.amount} onChange={e => setRecordForm({...recordForm, amount: e.target.value})} placeholder={`本次交易的總新台幣`} min="0" step="1" className="field" required />
                                                </div>
                                                <div>
                                                    <label className="form-label">{recordForm.isSell ? '入帳帳戶' : '扣款帳戶'}</label>
                                                    <div style={{ padding: '10px 14px', background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 10, display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '0.875rem', color: 'var(--text-2)' }}>
                                                        <span>現金</span>
                                                        <span style={{ fontWeight: 600, color: 'var(--text)' }}>餘額: ${accountBalances['現金'] ? accountBalances['現金'].currentBalance.toLocaleString() : 0}</span>
                                                    </div>
                                                </div>
                                            </React.Fragment>
                                        ) : (
                                            <React.Fragment>
                                                <div>
                                                    <label className="form-label">類別</label>
                                                    <select value={recordForm.category} onChange={e => setRecordForm({...recordForm, category: e.target.value})} className="field">
                                                        {(recordForm.type === 'expense' ? expenseCategories : incomeCategories).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                                    </select>
                                                </div>
                                                {recordForm.category === '其他' && (
                                                    <div>
                                                        <label className="form-label">自訂名稱</label>
                                                        <input type="text" value={recordForm.customCategory} onChange={e => setRecordForm({...recordForm, customCategory: e.target.value})} className="field" required />
                                                    </div>
                                                )}
                                                <div>
                                                    <label className="form-label">項目名稱</label>
                                                    <input type="text" value={recordForm.itemName} onChange={e => setRecordForm({...recordForm, itemName: e.target.value})} className="field" placeholder="例如：午餐、水電費" required />
                                                </div>
                                                <div>
                                                    <label className="form-label">金額</label>
                                                    <input type="number" value={recordForm.amount} onChange={e => setRecordForm({...recordForm, amount: e.target.value})} className="field" placeholder="0" min="0" step="1" required />
                                                </div>
                                                <div>
                                                    <label className="form-label">錢包 (支付/入帳方式)</label>
                                                    <select value={recordForm.wallet} onChange={e => setRecordForm({...recordForm, wallet: e.target.value})} className="field">
                                                        {activeWallets.map(w => <option key={w} value={w}>{w}</option>)}
                                                    </select>
                                                </div>
                                            </React.Fragment>
                                        )}
                                        <div>
                                            <label className="form-label">備註 (選填)</label>
                                            <input type="text" value={recordForm.note} onChange={e => setRecordForm({...recordForm, note: e.target.value})} className="field" />
                                        </div>
                                        <button type="submit" className="btn-pri" style={{ width: '100%', justifyContent: 'center', padding: '11px 18px', fontSize: '0.9rem', background: recordForm.type === 'expense' ? 'var(--expense)' : recordForm.type === 'income' ? 'var(--income)' : 'var(--invest)' }}>
                                            <Icon name="plus" size={17} /> 新增紀錄
                                        </button>
                                    </form>
                                </div>
                            )}
                        </div>

                        {/* 月份導覽 + 結餘 + 搜尋 */}
                        <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', justifyContent: 'space-between', gap: 10, marginTop: 8 }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                {/* Month switcher */}
                                <div className="surface" style={{ display: 'flex', alignItems: 'center', overflow: 'hidden' }}>
                                    <button onClick={() => changeRecordMonth(-1)} style={{ padding: '7px 10px', border: 'none', background: 'none', cursor: 'pointer', color: 'var(--text-2)', display: 'flex', transition: 'background 0.14s' }} onMouseOver={e=>e.currentTarget.style.background='var(--surface-2)'} onMouseOut={e=>e.currentTarget.style.background='none'}>
                                        <Icon name="chevron-left" size={16} />
                                    </button>
                                    <span style={{ padding: '0 8px', fontWeight: 700, fontSize: '0.875rem', color: 'var(--text)', minWidth: 80, textAlign: 'center' }}>{recordMonth}</span>
                                    <button onClick={() => changeRecordMonth(1)} style={{ padding: '7px 10px', border: 'none', background: 'none', cursor: 'pointer', color: 'var(--text-2)', display: 'flex', transition: 'background 0.14s' }} onMouseOver={e=>e.currentTarget.style.background='var(--surface-2)'} onMouseOut={e=>e.currentTarget.style.background='none'}>
                                        <Icon name="chevron-right" size={16} />
                                    </button>
                                </div>
                                {/* Income / Expense / Balance chips */}
                                <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
                                    <div className="mstat">
                                        <span className="mstat-label">收入</span>
                                        <span className="mstat-val" style={{ color: 'var(--income)' }}>+${monthIncome.toLocaleString()}</span>
                                    </div>
                                    <div style={{ width: 1, alignSelf: 'stretch', background: 'var(--border)' }} />
                                    <div className="mstat">
                                        <span className="mstat-label">支出</span>
                                        <span className="mstat-val" style={{ color: 'var(--expense)' }}>-${monthExpense.toLocaleString()}</span>
                                    </div>
                                    <div style={{ width: 1, alignSelf: 'stretch', background: 'var(--border)' }} />
                                    <div className="mstat">
                                        <span className="mstat-label">結餘</span>
                                        <span className="mstat-val" style={{ color: monthBalance >= 0 ? 'var(--income)' : 'var(--expense)' }}>
                                            {monthBalance >= 0 ? '+' : ''}${monthBalance.toLocaleString()}
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div style={{ display: 'flex', gap: 8, flex: '1 1 auto', maxWidth: 340 }}>
                                <div style={{ position: 'relative', flex: 1 }}>
                                    <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', display: 'flex', color: 'var(--text-3)', pointerEvents: 'none' }}>
                                        <Icon name="search" size={15} />
                                    </span>
                                    <input
                                        type="text"
                                        value={recordSearchTerm}
                                        onChange={(e) => { setRecordSearchTerm(e.target.value); setAiFilteredIds(null); }}
                                        placeholder="搜尋紀錄..."
                                        className="field"
                                        style={{ paddingLeft: 32, paddingTop: 8, paddingBottom: 8 }}
                                    />
                                </div>
                                {recordSearchTerm && (
                                    <button onClick={handleRecordAiSearch} disabled={isRecordAiSearching} style={{ padding: '0 12px', background: 'rgba(139,92,246,0.1)', border: '1px solid rgba(139,92,246,0.25)', borderRadius: 10, color: '#7c3aed', fontSize: '0.8rem', fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5, whiteSpace: 'nowrap', fontFamily: 'inherit', opacity: isRecordAiSearching ? 0.6 : 1 }}>
                                        {isRecordAiSearching ? <Icon name="loader" size={13} className="animate-spin" /> : <Icon name="cpu" size={13} />}
                                        AI 搜尋
                                    </button>
                                )}
                            </div>
                        </div>

                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 4 }}>
                            <h3 style={{ margin: 0, fontSize: '0.95rem', fontWeight: 700, color: 'var(--text)' }}>
                                {isSearching ? '搜尋結果' : '歷史紀錄'}
                            </h3>
                            <button onClick={() => setIsFilterOpen(!isFilterOpen)} style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '5px 10px', border: '1px solid var(--border)', borderRadius: 8, background: isFilterOpen ? 'rgba(99,102,241,0.08)' : 'var(--surface)', color: isFilterOpen ? 'var(--accent)' : 'var(--text-2)', fontSize: '0.8rem', fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit' }}>
                                <Icon name="sliders" size={13} /> 篩選
                            </button>
                        </div>

                        {/* 篩選器面板 */}
                        {isFilterOpen && (
                            <div className="bg-white p-4 md:p-5 rounded-xl border border-gray-200 shadow-sm space-y-4 animate-in fade-in slide-in-from-top-2 mb-6">
                                <div className="space-y-2">
                                    <Checkbox label="支出" checked={filters.expense} onChange={() => handleParentToggle('expense', allExpenseCats)} isParent />
                                    <div className="flex flex-wrap gap-x-4 gap-y-2 pl-6">
                                        {allExpenseCats.map(c => <Checkbox key={c} label={c} checked={isCatChecked('expense', c)} onChange={() => handleChildToggle('expense', c, allExpenseCats)} />)}
                                    </div>
                                </div>
                                <div className="border-t border-gray-100 pt-3 space-y-2">
                                    <Checkbox label="收入" checked={filters.income} onChange={() => handleParentToggle('income', allIncomeCats)} isParent />
                                    <div className="flex flex-wrap gap-x-4 gap-y-2 pl-6">
                                        {allIncomeCats.map(c => <Checkbox key={c} label={c} checked={isCatChecked('income', c)} onChange={() => handleChildToggle('income', c, allIncomeCats)} />)}
                                    </div>
                                </div>
                                <div className="border-t border-gray-100 pt-3 flex flex-wrap gap-x-8 gap-y-4">
                                    <div className="space-y-2">
                                        <Checkbox label="投資" checked={filters.investment} onChange={() => handleParentToggle('investment')} isParent />
                                        <div className="flex gap-4 pl-6">
                                            <Checkbox label="買入" checked={filters.investBuy} onChange={() => handleChildToggle('investment', 'investBuy')} />
                                            <Checkbox label="賣出" checked={filters.investSell} onChange={() => handleChildToggle('investment', 'investSell')} />
                                        </div>
                                    </div>
                                    <div>
                                        <Checkbox label="轉帳" checked={filters.transfer} onChange={() => setFilters(p => ({...p, transfer: !p.transfer}))} isParent />
                                    </div>
                                </div>
                            </div>
                        )}

                        {isSearching ? (
                            <div style={{ paddingTop: 4 }}>
                                {searchResults.length > 0 ? (
                                    <div className="surface" style={{ overflow: 'hidden' }}>
                                        {searchResults.map(renderRecordRow)}
                                    </div>
                                ) : (
                                    <div style={{ textAlign: 'center', padding: '32px 0', border: '1px dashed var(--border)', borderRadius: 14 }}>
                                        <Icon name="search" size={28} style={{ color: 'var(--text-3)', marginBottom: 8 }} />
                                        <p style={{ fontSize: '0.875rem', color: 'var(--text-3)', margin: 0 }}>找不到符合的紀錄</p>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <React.Fragment>
                                {isViewingCurrentMonth && (
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10, paddingTop: 4 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                            <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
                                                <span style={{ fontSize: '0.8rem', fontWeight: 700, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>本日記帳</span>
                                                {todayExpenseTotal > 0 && <span style={{ fontSize: '0.78rem', fontWeight: 600, color: 'var(--expense)' }}>-${todayExpenseTotal.toLocaleString()}</span>}
                                            </div>
                                            <button onClick={handleTaishinCardAdvice} disabled={isTaishinAdvising} style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '5px 10px', background: 'rgba(99,102,241,0.08)', border: '1px solid rgba(99,102,241,0.2)', borderRadius: 8, color: 'var(--accent)', fontSize: '0.75rem', fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', opacity: isTaishinAdvising ? 0.6 : 1 }}>
                                                {isTaishinAdvising ? <Icon name="loader" size={12} className="animate-spin"/> : <Icon name="credit-card" size={12}/>}
                                                台新卡 AI 分析
                                            </button>
                                        </div>

                                        {taishinAdvice && (
                                            <div style={{ background: 'rgba(99,102,241,0.06)', border: '1px solid rgba(99,102,241,0.2)', borderRadius: 12, padding: '14px 16px', fontSize: '0.85rem', color: '#3730a3', position: 'relative' }} className="markdown-body">
                                                <button onClick={() => setTaishinAdvice('')} style={{ position: 'absolute', top: 10, right: 10, background: 'none', border: 'none', cursor: 'pointer', color: '#818cf8', display: 'flex' }}><Icon name="x" size={15}/></button>
                                                {renderMarkdown(taishinAdvice)}
                                            </div>
                                        )}

                                        {filteredTodayRecords.length > 0 ? (
                                            filteredTodayRecords.map(record => {
                                                const { isInvestSell, isExpenseLike, isIncomeLike } = getRecordDisplayInfo(record);
                                                const amountColor = isExpenseLike ? 'var(--expense)' : isIncomeLike ? 'var(--income)' : 'var(--invest)';
                                                const amountPrefix = isExpenseLike ? '-' : isIncomeLike ? '+' : '';
                                                return editingRecordId === record.id ? (
                                                    <div key={record.id} style={{ background: 'rgba(99,102,241,0.05)', border: '1px solid rgba(99,102,241,0.2)', borderRadius: 12, padding: 16 }}>
                                                        {renderInlineEditContent()}
                                                    </div>
                                                ) : (
                                                <div key={record.id} className="surface" style={{ padding: '12px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, transition: 'box-shadow 0.15s', cursor: 'default' }}
                                                    onMouseOver={e=>e.currentTarget.style.boxShadow='0 2px 12px rgba(0,0,0,0.07)'}
                                                    onMouseOut={e=>e.currentTarget.style.boxShadow='none'}
                                                >
                                                    <div style={{ flex: 1, minWidth: 0, paddingRight: 8 }}>
                                                        <span style={{ fontWeight: 600, fontSize: '0.875rem', color: 'var(--text)', display: 'block', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{record.itemName}</span>
                                                        <div style={{ fontSize: '0.72rem', color: 'var(--text-3)', marginTop: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                                            {record.type === 'investment' && <span>{isInvestSell ? '賣出' : '買入'} {Math.abs(parseFloat(record.shares))} 股 &bull; </span>}
                                                            {record.type !== 'transfer' && <span>{record.wallet} &bull; {record.category}</span>}
                                                            {record.type === 'transfer' && <span>{record.fromWallet} → {record.toWallet}</span>}
                                                            {record.note && <span> &bull; {record.note}</span>}
                                                        </div>
                                                    </div>
                                                    <div style={{ textAlign: 'right', flexShrink: 0 }}>
                                                        <div style={{ fontWeight: 700, fontSize: '0.95rem', color: amountColor }}>{amountPrefix}${record.amount.toLocaleString()}</div>
                                                        <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end', marginTop: 4, opacity: 0 }} className="tx-actions">
                                                            <button onClick={() => handleEditRecord(record)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-3)', padding: 2, display: 'flex' }} onMouseOver={e=>e.currentTarget.style.color='var(--accent)'} onMouseOut={e=>e.currentTarget.style.color='var(--text-3)'}><Icon name="edit-2" size={13} /></button>
                                                            <button onClick={() => handleDeleteRecord(record.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-3)', padding: 2, display: 'flex' }} onMouseOver={e=>e.currentTarget.style.color='var(--expense)'} onMouseOut={e=>e.currentTarget.style.color='var(--text-3)'}><Icon name="trash-2" size={13} /></button>
                                                        </div>
                                                    </div>
                                                </div>
                                                )
                                            })
                                        ) : <p style={{ fontSize: '0.85rem', color: 'var(--text-3)', padding: '4px 0' }}>本日尚無紀錄</p>}
                                    </div>
                                )}

                                <div style={{ display: 'flex', flexDirection: 'column', gap: 8, paddingTop: 4 }}>
                                    <span style={{ fontSize: '0.8rem', fontWeight: 700, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{isViewingCurrentMonth ? '本月其他紀錄' : '本月紀錄'}</span>
                                    {filteredMonthRecords.length > 0 ? (
                                        <div className="surface" style={{ overflow: 'hidden' }}>
                                            {filteredMonthRecords.map(renderRecordRow)}
                                        </div>
                                    ) : <p style={{ fontSize: '0.85rem', color: 'var(--text-3)', textAlign: 'center', padding: '24px 0', border: '1px dashed var(--border)', borderRadius: 12, margin: 0 }}>本月無其他紀錄</p>}
                                </div>
                            </React.Fragment>
                        )}
                    </div>
                );
            };

            const renderWalletView = () => {
                const totalAssets = Object.values(accountBalances).reduce((a, b) => a + b.currentBalance, 0) + totalStockValue;
                return (
                    <div className="p-4 space-y-6">
                        <div style={{ background: 'linear-gradient(135deg, #1e1b4b 0%, #312e81 60%, #1e1b4b 100%)', padding: '28px 24px', borderRadius: 20, position: 'relative', overflow: 'hidden' }}>
                            {/* Decorative circles */}
                            <div style={{ position: 'absolute', top: -24, right: -24, width: 130, height: 130, background: 'rgba(99,102,241,0.22)', borderRadius: '50%', pointerEvents: 'none' }} />
                            <div style={{ position: 'absolute', bottom: -28, right: 70, width: 90, height: 90, background: 'rgba(139,92,246,0.16)', borderRadius: '50%', pointerEvents: 'none' }} />

                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', position: 'relative' }}>
                                <div>
                                    <p style={{ color: '#818cf8', fontSize: '0.78rem', fontWeight: 500, margin: '0 0 6px', letterSpacing: '0.02em' }}>總資產淨值 (TWD)</p>
                                    <div style={{ color: '#ffffff', fontSize: '2.2rem', fontWeight: 800, lineHeight: 1, letterSpacing: '-0.02em' }}>
                                        ${Math.round(totalAssets).toLocaleString()}
                                    </div>
                                    <div style={{ display: 'flex', gap: 20, marginTop: 14 }}>
                                        <div>
                                            <p style={{ color: '#6366f1', fontSize: '0.68rem', margin: '0 0 2px', fontWeight: 500 }}>帳戶資金</p>
                                            <p style={{ color: '#c7d2fe', fontSize: '0.88rem', fontWeight: 600, margin: 0 }}>
                                                ${Math.round(Object.values(accountBalances).reduce((a, b) => a + b.currentBalance, 0)).toLocaleString()}
                                            </p>
                                        </div>
                                        <div style={{ width: 1, background: 'rgba(255,255,255,0.12)' }} />
                                        <div>
                                            <p style={{ color: '#6366f1', fontSize: '0.68rem', margin: '0 0 2px', fontWeight: 500 }}>股票市值</p>
                                            <p style={{ color: '#c7d2fe', fontSize: '0.88rem', fontWeight: 600, margin: 0 }}>
                                                ${Math.round(totalStockValue).toLocaleString()}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => fetchCloudData(systemPassword)} style={{ padding: '7px 13px', background: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.14)', borderRadius: 9, color: '#c7d2fe', fontSize: '0.78rem', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5, fontFamily: 'inherit', transition: 'background 0.15s', flexShrink: 0 }} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.18)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.1)'}>
                                    <Icon name="refresh-cw" size={13} /> <span className="hidden md:inline">重整資料</span>
                                </button>
                            </div>
                        </div>

                        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                            <h3 style={{ margin: 0, fontSize: '0.9rem', fontWeight: 700, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>所有帳戶</h3>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                {Object.values(accountBalances).map(acc => (
